name: Automation Test

# ============================================================
# DEVELOPER REPO - SINGLE RUNNER TEST SUITE
# ============================================================
# Builds iOS app from selected branch, then runs the chosen
# test module on a single macOS runner.
#
# Architecture:
#
#   ── Run All ──
#   all                       → Run ALL test suites sequentially (~1158 tests, single runner)
#
#   ── Smoke (CRUD modules) ──
#   smoke                     → Full Smoke Dashboard — all 7 modules with live progress (~1 hr)
#   smoke-login               → Login flow (1 test)
#   smoke-site-selection      → Site selection flow (1 test)
#   smoke-asset-crud          → Asset Create + Read + Edit + Delete (4 tests)
#   smoke-location-crud       → Location Create + Read + Edit + Delete (4 tests)
#   smoke-connection-crud     → Connection Create + Read + Delete (3 tests)
#   smoke-issue-crud          → Issue Create + Read + Details + Delete (4 tests)
#
#   ── Full Test Suites (individual) ──
#   authentication-only       → Authentication (38 tests)
#   site-selection-only       → Site Selection (52 tests)
#   assets-p1-*               → P1: Creation + Edit + Busway + Capacitor + Bug Tests (112 tests)
#   assets-p2-*               → P1: CB + DS + Fuse + P2: Generator + Junction Box (108 tests)
#   assets-p3-*               → P2: Load Center + MCC + MCC Bucket + Motor + Other (109 tests)
#   assets-p4-*               → P2: OCP + P3: Panelboard + PDU + Relay + SWB + Transformer (97 tests)
#   assets-p5-*               → P3: UPS + Utility + VFD + Subtypes + P4: DS/Fuse Subtypes (112 tests)
#   assets-p6-*               → P4: Subtypes + Tasks + Issues + Connections + Asset Screen (114 tests)
#   issues-p1-*               → Issues Phase 1: List + Filter + Search + Creation + Class Change (119 tests)
#   issues-p2-*               → Issues Phase 2: OSHA + Thermal + Severity + Temperature + Ultrasonic (60 tests)
#   issues-p3-*               → Issues Phase 3: Ultrasonic Save + Swipe Delete + Sort + Status + CRUD (58 tests)
#   location-only             → Locations (82 tests)
#   connections-only          → Connections (94 tests)
#   offline-only              → Offline Mode (35 tests)
#   sitevisit-only            → Site Visit / Work Orders (all phases)
#
# S3 Drift Detection (branch-based):
#   release/dev       → dev S3 only         (10 tests)  → Total 27
#   release/qa        → qa S3 only          (10 tests)  → Total 27
#   release/stage     → staging S3 only     (10 tests)  → Total 27
#   release/prod      → prod + bces-iq      (18 tests)  → Total 35
#   main              → prod + bces-iq      (18 tests)  → Total 35
#
# Requirements:
#   Secrets: QA_REPO_TOKEN, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
# ============================================================

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build and test'
        required: true
        default: 'release/qa'
        type: choice
        options:
          - main
          - release/dev
          - release/qa
          - release/stage
          - release/prod
      test_suite:
        description: 'Which tests to run?'
        required: true
        default: 'smoke'
        type: choice
        options:
          - 'all'
          - 'smoke'
          - 'smoke-login'
          - 'smoke-site-selection'
          - 'smoke-asset-crud'
          - 'smoke-location-crud'
          - 'smoke-connection-crud'
          - 'smoke-issue-crud'
          - 'authentication-only'
          - 'site-selection-only'
          - 'assets-p1-creation-edit-busway-capacitor-bug'
          - 'assets-p2-cb-ds-fuse-generator-junctionbox'
          - 'assets-p3-loadcenter-mcc-mccbucket-motor-other'
          - 'assets-p4-ocp-panelboard-pdu-relay-swb-transformer'
          - 'assets-p5-ups-utility-vfd-subtypes'
          - 'assets-p6-subtypes-tasks-issues-connections-search'
          - 'issues-p1-list-filter-search-creation-classchange'
          - 'issues-p2-osha-thermal-severity-temperature-ultrasonic'
          - 'issues-p3-ultrasonic-save-swipe-delete-sort-status-crud'
          - 'location-only'
          - 'connections-only'
          - 'offline-only'
          - 'sitevisit-only'
          - 'sitevisit-phase1'
          - 'sitevisit-phase2'
          - 'sitevisit-phase3'
      capture_api:
        description: 'Capture API traffic for debugging'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 480

    steps:
      # ============================================================
      # STEP 1: Checkout iOS App Code (Selected Branch)
      # ============================================================
      - name: Checkout iOS App Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          path: ios-app

      # ============================================================
      # STEP 2: Checkout QA Automation Code
      # ============================================================
      - name: Checkout QA Automation Repository
        uses: actions/checkout@v4
        with:
          repository: eg-abhiyantsingh/iOS_automation_site
          token: ${{ secrets.QA_REPO_TOKEN }}
          path: qa-automation

      # ============================================================
      # STEP 3: Set Build Configuration
      # ============================================================
      - name: Set Build Configuration
        run: |
          BRANCH="${{ github.event.inputs.branch }}"

          case "$BRANCH" in
            release/dev)     SCHEME="Egalvanic PZ-Dev" ;;
            release/qa)      SCHEME="Egalvanic PZ-QA" ;;
            release/stage*)  SCHEME="Egalvanic PZ-Staging" ;;
            release/prod|main) SCHEME="Egalvanic PZ" ;;
            *)               SCHEME="Egalvanic PZ-QA" ;;
          esac

          XCODEPROJ=$(find ios-app -name "*.xcodeproj" -type d | head -1)
          SAFE_BRANCH=$(echo "$BRANCH" | tr '/' '-')

          echo "BUILD_SCHEME=$SCHEME" >> $GITHUB_ENV
          echo "XCODEPROJ_PATH=$XCODEPROJ" >> $GITHUB_ENV
          echo "SAFE_BRANCH=$SAFE_BRANCH" >> $GITHUB_ENV

          echo "📱 Branch: $BRANCH | Scheme: $SCHEME"

      # ============================================================
      # STEP 3.5: Detect S3 Drift Environment (branch-based)
      # ============================================================
      - name: Detect S3 Drift Environment
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          
          echo "Branch: $BRANCH"
          
          # ────────────────────────────────────────────────────────
          # Developer Branch → S3 Environment Mapping
          # ────────────────────────────────────────────────────────
          # release/dev       → dev only         (10 S3 tests)
          # release/qa        → qa only          (10 S3 tests)
          # release/stage     → staging only     (10 S3 tests)
          # release/prod      → prod + bces-iq   (18 S3 tests)
          # main              → prod + bces-iq   (18 S3 tests)
          # ────────────────────────────────────────────────────────
          
          case "$BRANCH" in
            release/dev)
              S3_ENV="dev"
              S3_XML="src/test/resources/smoke/testng-smoke-s3drift-dev.xml"
              S3_TESTS=10
              S3_LABEL="DEV only" ;;
            release/qa)
              S3_ENV="qa"
              S3_XML="src/test/resources/smoke/testng-smoke-s3drift-qa.xml"
              S3_TESTS=10
              S3_LABEL="QA only" ;;
            release/stage*)
              S3_ENV="staging"
              S3_XML="src/test/resources/smoke/testng-smoke-s3drift-staging.xml"
              S3_TESTS=10
              S3_LABEL="STAGING only" ;;
            release/prod)
              S3_ENV="production"
              S3_XML="src/test/resources/smoke/testng-smoke-s3drift-production.xml"
              S3_TESTS=18
              S3_LABEL="PRODUCTION (prod + bces-iq)" ;;
            main)
              S3_ENV="production"
              S3_XML="src/test/resources/smoke/testng-smoke-s3drift-production.xml"
              S3_TESTS=18
              S3_LABEL="PRODUCTION (prod + bces-iq)" ;;
            *)
              S3_ENV="all"
              S3_XML="src/test/resources/smoke/testng-smoke-s3drift.xml"
              S3_TESTS=42
              S3_LABEL="ALL (5 environments)" ;;
          esac
          
          # S3 (dynamic) + 17 mobile tests:
          # 1 Login + 1 Site + 4 Asset + 4 Location + 3 Connection + 4 Issue CRUD = 17
          TOTAL_SMOKE_TESTS=$((S3_TESTS + 17))
          
          echo "S3_ENV=$S3_ENV" >> $GITHUB_ENV
          echo "S3_XML=$S3_XML" >> $GITHUB_ENV
          echo "S3_TESTS=$S3_TESTS" >> $GITHUB_ENV
          echo "S3_LABEL=$S3_LABEL" >> $GITHUB_ENV
          echo "TOTAL_SMOKE_TESTS=$TOTAL_SMOKE_TESTS" >> $GITHUB_ENV
          
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  🌿 Branch:           $BRANCH"
          echo "║  🪣 S3 Environment:   $S3_LABEL"
          echo "║  🧪 S3 Tests:         $S3_TESTS"
          echo "║  📊 Total Smoke:      $TOTAL_SMOKE_TESTS tests"
          echo "╚══════════════════════════════════════════════════════════════╝"

      # ============================================================
      # STEP 4: Setup Build Environment
      # ============================================================
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Appium
        run: |
          npm install -g appium@latest > /dev/null 2>&1
          appium driver install xcuitest > /dev/null 2>&1
          echo "✅ Appium $(appium --version)"

      - name: Setup API Capture
        if: github.event.inputs.capture_api != 'false'
        run: |
          brew install mitmproxy > /dev/null 2>&1
          mkdir -p qa-automation/reports/api_logs qa-automation/scripts

          cat > qa-automation/scripts/parse_api.py << 'PYSCRIPT'
          import json, sys, os
          def main(flow_file):
              failed, total = [], 0
              try:
                  from mitmproxy import io as mitmio
                  with open(flow_file, "rb") as f:
                      for flow in mitmio.FlowReader(f).stream():
                          if hasattr(flow, 'response') and flow.response:
                              total += 1
                              if flow.response.status_code >= 400:
                                  failed.append({
                                      "status": flow.response.status_code,
                                      "method": flow.request.method,
                                      "url": flow.request.pretty_url,
                                      "response": (flow.response.get_text() or "")[:500]
                                  })
              except Exception as e:
                  print(f"Error: {e}")
                  return
              print(f"\n{'='*60}\nAPI REPORT: {total} calls, {len(failed)} failed\n{'='*60}")
              if failed:
                  print("❌ FAILED APIs:")
                  for api in failed:
                      print(f"  [{api['status']}] {api['method']} {api['url']}")
              else:
                  print("✅ All APIs successful!")
              os.makedirs("qa-automation/reports/api_logs", exist_ok=True)
              with open("qa-automation/reports/api_logs/failed_apis.json", "w") as f:
                  json.dump({"total": total, "failed": len(failed), "details": failed}, f, indent=2)
          if __name__ == "__main__":
              main(sys.argv[1] if len(sys.argv) > 1 else "api_traffic.flow")
          PYSCRIPT
          echo "✅ API capture ready"

      # ============================================================
      # STEP 5: Boot Simulator
      # ============================================================
      - name: Boot Simulator
        run: |
          # Find best available iPhone simulator
          UDID=""
          for VERSION in 18.5 18.4 18.3 18.2 18.1 18.0; do
            for MODEL in "iPhone 16 Pro" "iPhone 15 Pro" "iPhone"; do
              UDID=$(xcrun simctl list devices available | grep -A 100 "iOS $VERSION" | grep "$MODEL" | head -1 | awk -F '[()]' '{print $2}')
              [ -n "$UDID" ] && break 2
            done
          done

          if [ -z "$UDID" ]; then
            echo "❌ No iPhone simulator found!"
            xcrun simctl list devices available
            exit 1
          fi

          DEVICE_NAME=$(xcrun simctl list devices available | grep "$UDID" | sed 's/(.*//' | xargs)
          PLATFORM_VERSION=$(xcrun simctl list devices available | grep -B 20 "$UDID" | grep "iOS" | tail -1 | sed 's/-- iOS //' | sed 's/ --.*//')
          [ -z "$PLATFORM_VERSION" ] && PLATFORM_VERSION="18.5"

          echo "DEVICE_NAME=$DEVICE_NAME" >> $GITHUB_ENV
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          echo "PLATFORM_VERSION=$PLATFORM_VERSION" >> $GITHUB_ENV
          echo "📱 $DEVICE_NAME | iOS $PLATFORM_VERSION | $UDID"

          # Boot with proper (Booted) check
          xcrun simctl shutdown "$UDID" 2>/dev/null || true
          sleep 3
          xcrun simctl boot "$UDID" 2>/dev/null || true

          TIMEOUT=120
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            if xcrun simctl list devices | grep "$UDID" | grep -q "(Booted)"; then
              echo "✅ Booted after ${ELAPSED}s"
              break
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

          [ $ELAPSED -ge $TIMEOUT ] && echo "❌ Boot timeout" && exit 1

          # Post-boot stabilization (matches ios-tests.yml)
          sleep 45
          echo "✅ Simulator ready"

      # ============================================================
      # STEP 6: Build iOS App from Source
      # ============================================================
      - name: Resolve Swift Package Dependencies
        run: |
          cd ios-app
          PROJECT_FILE=$(basename "$XCODEPROJ_PATH")
          echo "Resolving SPM dependencies..."
          set +e
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_FILE" \
            -scheme "${{ env.BUILD_SCHEME }}" \
            -clonedSourcePackagesDirPath ../spm-cache \
            > /tmp/spm-resolve.log 2>&1
          SPM_EXIT=$?
          set -e
          if [ "$SPM_EXIT" -ne 0 ]; then
            echo "❌ SPM dependency resolution FAILED (exit code $SPM_EXIT)"
            echo "─── SPM Errors ───"
            grep -i "error:" /tmp/spm-resolve.log | head -20 || true
            echo "─── Full Output (last 30 lines) ───"
            tail -30 /tmp/spm-resolve.log
            cp /tmp/spm-resolve.log "${{ github.workspace }}/spm-error.log" 2>/dev/null || true
            exit 1
          fi
          echo "✅ Dependencies resolved"

      - name: Build iOS App for Simulator
        run: |
          cd ios-app
          PROJECT_FILE=$(basename "$XCODEPROJ_PATH")

          echo "🔨 Building: ${{ env.BUILD_SCHEME }} from ${{ github.event.inputs.branch }}"
          XCODE_VER=$(xcodebuild -version 2>&1 || true)
          SWIFT_VER=$(swift --version 2>&1 || true)
          echo "  Xcode: $(echo "$XCODE_VER" | head -1)"
          echo "  Swift: $(echo "$SWIFT_VER" | head -1)"

          # ═══════════════════════════════════════════════════════════
          # CI runner (macos-15) has M1 / 3 cores / 7GB RAM — much
          # slower than a developer Mac. Complex SwiftUI expressions
          # can exceed the Swift type-checker's default time limit.
          #
          # Fix: Create an xcconfig that increases the per-expression
          # solver timeout to 240s (from default ~15s) so the slower
          # CI CPU has enough time. $(inherited) preserves any flags
          # the Xcode project already defines.
          #
          # Also: No pipes on xcodebuild output — causes SIGPIPE.
          # ═══════════════════════════════════════════════════════════
          cat > /tmp/ci-overrides.xcconfig << 'XCCONFIG'
          // CI build overrides — increase Swift type-checker timeout for slower CI hardware
          OTHER_SWIFT_FLAGS = $(inherited) -Xfrontend -solver-expression-time-threshold -Xfrontend 240
          XCCONFIG

          echo "  Building... (output saved to /tmp/xcodebuild.log)"
          set +e
          xcodebuild build \
            -project "$PROJECT_FILE" \
            -scheme "${{ env.BUILD_SCHEME }}" \
            -destination "platform=iOS Simulator,id=${{ env.SIMULATOR_UDID }}" \
            -derivedDataPath build \
            -clonedSourcePackagesDirPath ../spm-cache \
            -xcconfig /tmp/ci-overrides.xcconfig \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            > /tmp/xcodebuild.log 2>&1
          BUILD_EXIT=$?
          set -e

          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo ""
            echo "╔══════════════════════════════════════════════════════════════╗"
            echo "║  ❌ BUILD FAILED (exit code $BUILD_EXIT)"
            echo "╚══════════════════════════════════════════════════════════════╝"
            echo ""
            echo "─── Swift Compilation Errors ───"
            grep "error:" /tmp/xcodebuild.log | grep -v "^$" | grep -v "Command.*failed" | head -40 || echo "(no error: lines found)"
            echo ""
            echo "─── Build Summary (last 20 lines) ───"
            tail -20 /tmp/xcodebuild.log
            cp /tmp/xcodebuild.log "${{ github.workspace }}/xcodebuild-error.log" 2>/dev/null || true
            exit 1
          fi

          echo "─── Build Output (last 5 lines) ───"
          tail -5 /tmp/xcodebuild.log

          echo ""
          APP_PATH=$(find build -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ Build reported success but no .app found"
            find build -type d | head -20
            exit 1
          fi

          # Verify the executable exists inside the .app bundle
          EXEC_NAME=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_PATH/Info.plist" 2>/dev/null)
          if [ -z "$EXEC_NAME" ] || [ ! -f "$APP_PATH/$EXEC_NAME" ]; then
            echo "❌ App bundle missing executable!"
            echo "  Expected: $APP_PATH/$EXEC_NAME"
            echo "─── App contents ───"
            ls -la "$APP_PATH/"
            exit 1
          fi

          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "✅ Built: $(basename "$APP_PATH") (exec: $EXEC_NAME)"

          mkdir -p ../qa-automation/apps
          cp -R "$APP_PATH" "../qa-automation/apps/"

      # ============================================================
      # STEP 6.5: Verify Built App Configuration
      # ============================================================
      - name: Verify App Configuration
        run: |
          APP_FILE=$(ls qa-automation/apps/ | grep ".app" | head -1)
          APP="qa-automation/apps/$APP_FILE"

          if [ -f "$APP/Info.plist" ]; then
            BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP/Info.plist" 2>/dev/null)
            echo "─── Built App Config ───"
            echo "  Bundle ID:    $BUNDLE_ID"
            echo "  API URL:      $(/usr/libexec/PlistBuddy -c 'Print :API_BASE_URL' "$APP/Info.plist" 2>/dev/null)"
            echo "  Environment:  $(/usr/libexec/PlistBuddy -c 'Print :ENVIRONMENT_NAME' "$APP/Info.plist" 2>/dev/null)"
            echo "  Version:      $(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP/Info.plist" 2>/dev/null)"
            # Export bundle ID so tests can use the correct value for terminateApp/activateApp
            echo "APP_BUNDLE_ID=$BUNDLE_ID" >> $GITHUB_ENV
          fi

      # ============================================================
      # STEP 7: Setup Appium & WDA
      # ============================================================
      - name: Pre-build WebDriverAgent
        run: |
          WDA_PATH=$(find ~/.appium -name "WebDriverAgent.xcodeproj" -type f 2>/dev/null | head -1 | xargs dirname)

          if [ -n "$WDA_PATH" ]; then
            cd "$WDA_PATH"
            set +e
            xcodebuild build-for-testing \
              -project WebDriverAgent.xcodeproj \
              -scheme WebDriverAgentRunner \
              -destination "platform=iOS Simulator,id=${{ env.SIMULATOR_UDID }}" \
              -derivedDataPath /tmp/wda-build \
              -quiet > /tmp/wda-build.log 2>&1
            WDA_EXIT=$?
            set -e
            if [ "$WDA_EXIT" -ne 0 ]; then
              echo "⚠️ WDA pre-build failed (exit $WDA_EXIT) — will build on first test run"
              tail -10 /tmp/wda-build.log 2>/dev/null || true
            else
              echo "✅ WDA pre-built"
            fi
          fi

      - name: Start Appium Server
        run: |
          appium --relaxed-security --log-level error > appium.log 2>&1 &

          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4723/status 2>/dev/null | grep -q "200"; then
              echo "✅ Appium ready"
              break
            fi
            sleep 2
          done
          sleep 10

      - name: Warm-up WDA Session
        run: |
          APP_FILE=$(ls qa-automation/apps/ | grep ".app" | head -1)
          FULL_APP_PATH="${{ github.workspace }}/qa-automation/apps/$APP_FILE"
          echo "FULL_APP_PATH=$FULL_APP_PATH" >> $GITHUB_ENV

          WDA_SUCCESS=false
          for attempt in 1 2 3 4 5; do
            echo "WDA warm-up attempt $attempt/5..."

            # Use fresh WDA on retries to avoid stale state
            if [ $attempt -le 2 ]; then
              USE_NEW_WDA="false"
            else
              USE_NEW_WDA="true"
              echo "  ↳ Using fresh WDA build for attempt $attempt"
            fi

            SESSION_RESPONSE=$(curl -s -X POST http://127.0.0.1:4723/session \
              -H "Content-Type: application/json" \
              -d '{
                "capabilities": {
                  "alwaysMatch": {
                    "platformName": "iOS",
                    "appium:automationName": "XCUITest",
                    "appium:deviceName": "'"${{ env.DEVICE_NAME }}"'",
                    "appium:udid": "'"${{ env.SIMULATOR_UDID }}"'",
                    "appium:platformVersion": "'"${{ env.PLATFORM_VERSION }}"'",
                    "appium:app": "'"$FULL_APP_PATH"'",
                    "appium:wdaLaunchTimeout": 600000,
                    "appium:wdaConnectionTimeout": 300000,
                    "appium:useNewWDA": '"$USE_NEW_WDA"',
                    "appium:noReset": false
                  }
                }
              }' --max-time 600 2>&1) || true

            SESSION_ID=$(echo "$SESSION_RESPONSE" | grep -o '"sessionId":"[^"]*"' | cut -d'"' -f4 || true)

            if [ -n "$SESSION_ID" ]; then
              echo "✅ WDA session OK (attempt $attempt)"
              sleep 10
              curl -s -X DELETE "http://127.0.0.1:4723/session/$SESSION_ID" || true
              sleep 5
              echo "✅ WDA warm-up complete"
              WDA_SUCCESS=true
              break
            else
              echo "  ❌ Attempt $attempt failed. Response:"
              echo "$SESSION_RESPONSE" | head -5
              if [ $attempt -lt 5 ]; then
                echo "  ↳ Retrying in 30s..."
                sleep 30
              fi
            fi
          done

          if [ "$WDA_SUCCESS" = false ]; then
            echo ""
            echo "❌ WDA warm-up FAILED after 5 attempts!"
            echo "─── Appium log (last 50 lines) ───"
            tail -50 appium.log 2>/dev/null || echo "(no appium log)"
            echo "─── Simulator status ───"
            xcrun simctl list devices | grep -A1 "Booted" || echo "(no booted sim)"
            echo "─── App file check ───"
            ls -la "$FULL_APP_PATH" 2>/dev/null || echo "App not found at: $FULL_APP_PATH"
            exit 1
          fi

      # ============================================================
      # STEP 8: Start API Capture & Run Tests
      # ============================================================
      # ============================================================
      # STEP 7.5: AWS Credentials for S3 Drift Detection
      # ============================================================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Verify AWS Access
        run: |
          echo "Verifying AWS CLI access for S3 drift detection..."
          aws sts get-caller-identity || echo "⚠️ AWS credentials not configured — S3 drift tests will be skipped"
          echo "✅ AWS access verified"

      - name: Start API Traffic Capture
        if: github.event.inputs.capture_api != 'false'
        run: |
          timeout 5 mitmdump --set confdir=~/.mitmproxy 2>/dev/null || true
          xcrun simctl keychain "${{ env.SIMULATOR_UDID }}" add-root-cert ~/.mitmproxy/mitmproxy-ca-cert.pem 2>/dev/null || true
          mitmdump -w api_traffic.flow -p 8888 --set flow_detail=2 --quiet > mitmproxy.log 2>&1 &
          echo "MITM_PID=$!" >> $GITHUB_ENV
          sleep 3
          networksetup -setwebproxy "Wi-Fi" 127.0.0.1 8888 2>/dev/null || true
          networksetup -setsecurewebproxy "Wi-Fi" 127.0.0.1 8888 2>/dev/null || true
          echo "✅ API capture started"

      - name: Run Tests
        id: run_tests
        continue-on-error: true
        run: |
          cd qa-automation

          APP_FILE=$(ls apps/ | grep ".app" | head -1)
          APP_PATH="${{ github.workspace }}/qa-automation/apps/$APP_FILE"

          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  🧪 ${{ github.event.inputs.test_suite }} tests"
          echo "║  📱 ${{ env.DEVICE_NAME }} | iOS ${{ env.PLATFORM_VERSION }}"
          echo "║  🌿 ${{ github.event.inputs.branch }} → ${{ env.BUILD_SCHEME }}"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

          # ═══════════════════════════════════════════════════════════
          # Maven flags:
          #   -B  = Batch mode (no download progress, no color codes)
          #   -q  = Quiet (suppress INFO logs, only WARN/ERROR)
          #
          # Combined with ConsoleProgressListener in testng XMLs,
          # CI output shows ONLY test progress + results
          # ═══════════════════════════════════════════════════════════

          # ─────────────────────────────────────────────────────────
          # Shell function to run Maven with proper quoting.
          # DEVICE_NAME contains spaces (e.g. "iPhone 16 Pro") which
          # causes word-splitting if passed via a variable.
          # Using a function with quoted args avoids this entirely.
          # ─────────────────────────────────────────────────────────
          run_mvn() {
            local SUITE_XML="$1"
            mvn test -B -q \
              -DsuiteXmlFile="$SUITE_XML" \
              -DDEVICE_NAME="${{ env.DEVICE_NAME }}" \
              -DPLATFORM_VERSION="${{ env.PLATFORM_VERSION }}" \
              -DSIMULATOR_UDID="${{ env.SIMULATOR_UDID }}" \
              -DAPP_PATH="$APP_PATH" \
              -DAPP_BUNDLE_ID="${{ env.APP_BUNDLE_ID }}"
          }

          case "${{ github.event.inputs.test_suite }}" in
            all)
              # ── Run ALL test suites sequentially on single runner ──
              # Auth → Site → Assets P1-P6 → Issues P1-P3 → Location → Connections
              # ~1155 tests total — expect long runtime on single runner
              run_mvn src/test/resources/parallel/testng-auth.xml
              run_mvn src/test/resources/parallel/testng-site.xml
              run_mvn src/test/resources/parallel/testng-assets-part1.xml
              run_mvn src/test/resources/parallel/testng-assets-part2.xml
              run_mvn src/test/resources/parallel/testng-assets-part3.xml
              run_mvn src/test/resources/parallel/testng-assets-part4.xml
              run_mvn src/test/resources/parallel/testng-assets-part5.xml
              run_mvn src/test/resources/parallel/testng-assets-part6.xml
              run_mvn src/test/resources/parallel/testng-issues-phase1.xml
              run_mvn src/test/resources/parallel/testng-issues-phase2.xml
              run_mvn src/test/resources/parallel/testng-issues-phase3.xml
              run_mvn src/test/resources/parallel/testng-location.xml
              run_mvn src/test/resources/parallel/testng-connections.xml
              run_mvn src/test/resources/parallel/testng-sitevisit.xml
              ;;
            smoke)
              # ── Smoke Dashboard — all 7 CRUD modules with live progress ──
              # S3 drift env is auto-detected from branch (set in "Detect S3 Drift Environment" step).
              export APP_PATH
              export S3_ENV="${{ env.S3_ENV }}"
              export S3_XML="${{ env.S3_XML }}"
              export S3_TESTS="${{ env.S3_TESTS }}"
              export S3_LABEL="${{ env.S3_LABEL }}"
              export TOTAL_SMOKE_TESTS="${{ env.TOTAL_SMOKE_TESTS }}"
              bash .github/scripts/smoke-dashboard.sh
              ;;
            # ── Individual Smoke CRUD Modules ──
            smoke-login)
              run_mvn src/test/resources/smoke/testng-smoke-login.xml
              ;;
            smoke-site-selection)
              run_mvn src/test/resources/smoke/testng-smoke-site-selection.xml
              ;;
            smoke-asset-crud)
              run_mvn src/test/resources/smoke/testng-smoke-asset-crud.xml
              ;;
            smoke-location-crud)
              run_mvn src/test/resources/smoke/testng-smoke-location-crud.xml
              ;;
            smoke-connection-crud)
              run_mvn src/test/resources/smoke/testng-smoke-connection-crud.xml
              ;;
            smoke-issue-crud)
              run_mvn src/test/resources/smoke/testng-smoke-issue-crud.xml
              ;;
            # ── Full Test Suites ──
            authentication-only)
              run_mvn src/test/resources/parallel/testng-auth.xml
              ;;
            site-selection-only)
              run_mvn src/test/resources/parallel/testng-site.xml
              ;;
            assets-p1-*)
              run_mvn src/test/resources/parallel/testng-assets-part1.xml
              ;;
            assets-p2-*)
              run_mvn src/test/resources/parallel/testng-assets-part2.xml
              ;;
            assets-p3-*)
              run_mvn src/test/resources/parallel/testng-assets-part3.xml
              ;;
            assets-p4-*)
              run_mvn src/test/resources/parallel/testng-assets-part4.xml
              ;;
            assets-p5-*)
              run_mvn src/test/resources/parallel/testng-assets-part5.xml
              ;;
            assets-p6-*)
              run_mvn src/test/resources/parallel/testng-assets-part6.xml
              ;;
            issues-p1-*)
              run_mvn src/test/resources/parallel/testng-issues-phase1.xml
              ;;
            issues-p2-*)
              run_mvn src/test/resources/parallel/testng-issues-phase2.xml
              ;;
            issues-p3-*)
              run_mvn src/test/resources/parallel/testng-issues-phase3.xml
              ;;
            location-only)
              run_mvn src/test/resources/parallel/testng-location.xml
              ;;
            connections-only)
              run_mvn src/test/resources/parallel/testng-connections.xml
              ;;
            offline-only)
              run_mvn src/test/resources/parallel/testng-offline.xml
              ;;
            sitevisit-only)
              run_mvn src/test/resources/parallel/testng-sitevisit.xml
              ;;
            sitevisit-phase1)
              run_mvn src/test/resources/parallel/testng-sitevisit-phase1.xml
              ;;
            sitevisit-phase2)
              run_mvn src/test/resources/parallel/testng-sitevisit-phase2.xml
              ;;
            sitevisit-phase3)
              run_mvn src/test/resources/parallel/testng-sitevisit-phase3.xml
              ;;
          esac

      # ============================================================
      # STEP 9: Reports & Summary
      # ============================================================
      - name: Stop API Capture
        if: always() && github.event.inputs.capture_api != 'false'
        run: |
          kill ${{ env.MITM_PID }} 2>/dev/null || true
          sleep 2
          networksetup -setwebproxystate "Wi-Fi" off 2>/dev/null || true
          networksetup -setsecurewebproxystate "Wi-Fi" off 2>/dev/null || true

          if [ -f "api_traffic.flow" ]; then
            pip install mitmproxy --quiet 2>/dev/null || true
            python qa-automation/scripts/parse_api.py api_traffic.flow || true
          fi

      - name: Test Results Summary
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  📊 TEST RESULTS                                             ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  Branch:  ${{ github.event.inputs.branch }}"
          echo "║  Scheme:  ${{ env.BUILD_SCHEME }}"
          echo "║  Suite:   ${{ github.event.inputs.test_suite }}"
          echo "║  S3 Env:  ${{ env.S3_LABEL }} (${{ env.S3_TESTS }} tests)"
          echo "║  Device:  ${{ env.DEVICE_NAME }} | iOS ${{ env.PLATFORM_VERSION }}"
          echo "║  Result:  ${{ steps.run_tests.outcome }}"
          echo "╚══════════════════════════════════════════════════════════════╝"

          # For smoke suite, dashboard script sets SMOKE_* env vars with
          # aggregated counts across all 5 modules. For other suites,
          # parse the single TestNG results XML.
          if [ -n "${{ env.SMOKE_PASSED }}" ]; then
            echo ""
            echo "  ✅ Passed:  ${{ env.SMOKE_PASSED }}"
            echo "  ❌ Failed:  ${{ env.SMOKE_FAILED }}"
            echo "  ⏭️  Skipped: ${{ env.SMOKE_SKIPPED }}"
            echo "  ⏱️  Duration: ${{ env.SMOKE_DURATION }}s"
          else
            RESULTS_XML="qa-automation/target/surefire-reports/testng-results.xml"
            if [ -f "$RESULTS_XML" ]; then
              # Use sed instead of grep -oP (BSD grep on macOS doesn't support -P)
              PASSED=$(sed -n 's/.*passed="\([^"]*\)".*/\1/p' "$RESULTS_XML" | head -1)
              FAILED=$(sed -n 's/.*failed="\([^"]*\)".*/\1/p' "$RESULTS_XML" | head -1)
              SKIPPED=$(sed -n 's/.*skipped="\([^"]*\)".*/\1/p' "$RESULTS_XML" | head -1)
              echo ""
              echo "  ✅ Passed:  ${PASSED:-0}"
              echo "  ❌ Failed:  ${FAILED:-0}"
              echo "  ⏭️  Skipped: ${SKIPPED:-0}"
            fi
          fi

          # Show Extent Report locations
          echo ""
          DETAILED=$(ls qa-automation/reports/detailed/*.html 2>/dev/null | tail -1)
          CLIENT=$(ls qa-automation/reports/client/*.html 2>/dev/null | tail -1)
          [ -n "$DETAILED" ] && echo "  📋 Detailed Report: $DETAILED"
          [ -n "$CLIENT" ] && echo "  📋 Client Report:   $CLIENT"

      # Artifact includes run number to avoid name conflicts
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports-${{ env.SAFE_BRANCH }}-${{ github.event.inputs.test_suite }}-${{ github.run_number }}
          path: |
            qa-automation/reports/
            qa-automation/target/surefire-reports/
            qa-automation/screenshots/
          retention-days: 30

      # Upload build log when xcodebuild fails (shows actual Swift errors)
      - name: Upload Build Log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            xcodebuild-error.log
            spm-error.log
          retention-days: 7
          if-no-files-found: ignore

      # Only upload Appium log on failure (saves artifact space)
      - name: Upload Appium Log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log-${{ github.run_number }}
          path: appium.log
          retention-days: 7

      # ============================================================
      # STEP 10: Cleanup
      # ============================================================
      - name: Shutdown Simulator
        if: always()
        run: |
          xcrun simctl shutdown "${{ env.SIMULATOR_UDID }}" 2>/dev/null || true

      # ============================================================
      # STEP 11: Send Email Report
      # Reads EMAIL_TO directly from AppConstants.java — no secrets needed
      # ============================================================
      - name: Extract Email Recipients
        if: always()
        id: email_config
        run: |
          APPCONST="qa-automation/src/main/java/com/egalvanic/constants/AppConstants.java"
          if [ -f "$APPCONST" ]; then
            EMAIL_TO=$(grep 'public static final String EMAIL_TO' "$APPCONST" | grep -v '^\s*//' | sed 's/.*"\(.*\)".*/\1/' | sed 's/,[[:space:]]*$//')
            echo "EMAIL_TO=$EMAIL_TO" >> $GITHUB_OUTPUT
            echo "Email will be sent to: $EMAIL_TO"
          else
            echo "EMAIL_TO=abhiyant.singh@egalvanic.com" >> $GITHUB_OUTPUT
          fi

      - name: Prepare Email Summary
        if: always()
        id: email_summary
        run: |
          RESULTS_XML="qa-automation/target/surefire-reports/testng-results.xml"
          if [ -n "$SMOKE_PASSED" ]; then
            PASSED="$SMOKE_PASSED"
            FAILED="$SMOKE_FAILED"
            SKIPPED="$SMOKE_SKIPPED"
          elif [ -f "$RESULTS_XML" ]; then
            PASSED=$(sed -n 's/.*passed="\([^"]*\)".*/\1/p' "$RESULTS_XML" | head -1)
            FAILED=$(sed -n 's/.*failed="\([^"]*\)".*/\1/p' "$RESULTS_XML" | head -1)
            SKIPPED=$(sed -n 's/.*skipped="\([^"]*\)".*/\1/p' "$RESULTS_XML" | head -1)
          else
            PASSED="0"
            FAILED="unknown"
            SKIPPED="0"
          fi
          echo "PASSED=${PASSED:-0}" >> $GITHUB_OUTPUT
          echo "FAILED=${FAILED:-0}" >> $GITHUB_OUTPUT
          echo "SKIPPED=${SKIPPED:-0}" >> $GITHUB_OUTPUT

      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ steps.email_config.outputs.EMAIL_TO }}
          from: iOS Automation <${{ secrets.EMAIL_USERNAME }}>
          subject: iOS Automation - ${{ github.event.inputs.test_suite }} (${{ github.ref_name }}) - ${{ steps.email_summary.outputs.PASSED }} Passed / ${{ steps.email_summary.outputs.FAILED }} Failed
          body: |
            iOS Automation Test Results
            ============================

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Test Suite: ${{ github.event.inputs.test_suite }}
            Triggered by: ${{ github.actor }}

            Test Summary:
            - Passed: ${{ steps.email_summary.outputs.PASSED }}
            - Failed: ${{ steps.email_summary.outputs.FAILED }}
            - Skipped: ${{ steps.email_summary.outputs.SKIPPED }}

            Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The Client Report is attached to this email.
          attachments: qa-automation/reports/client/*.html
        continue-on-error: true