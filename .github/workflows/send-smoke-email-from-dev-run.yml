name: Send Email for Dev Repo Smoke Run

# ═══════════════════════════════════════════════════════════════════════════
# Sends the smoke-test result email for a dev repo CI run, WITHOUT requiring
# any changes to Egalvanic/eg-pz-mobile-iOS.
#
# How it works:
#   1. You paste a dev repo run ID/URL when dispatching this workflow
#   2. It reads run metadata + artifacts from dev repo via GitHub API
#   3. Parses testng-results.xml for pass/fail counts
#   4. Reads EMAIL_TO directly from AppConstants.java line 210
#   5. Sends the email with the Client Report HTML attached
#
# Required secrets in THIS repo (Settings > Secrets and variables > Actions):
#   - EMAIL_USERNAME        your gmail address
#   - EMAIL_PASSWORD        gmail app password (16-char)
#   - DEV_REPO_TOKEN        fine-grained PAT with read access to the dev repo
#                            (Actions: Read, Contents: Read)
# ═══════════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      run_url_or_id:
        description: 'Dev repo run URL or ID (e.g. 24673078422)'
        required: true
      dev_repo:
        description: 'Dev repo (owner/name)'
        required: false
        default: 'Egalvanic/eg-pz-mobile-iOS'

jobs:
  send-email:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      INPUT_RUN: ${{ github.event.inputs.run_url_or_id }}
      INPUT_DEV_REPO: ${{ github.event.inputs.dev_repo }}
    steps:
      - name: Checkout AppConstants.java + report generator script
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            src/main/java/com/egalvanic/constants/AppConstants.java
            scripts/generate_consolidated_report.py

      - name: Parse run ID from input
        id: parse
        run: |
          RUN_ID=$(echo "$INPUT_RUN" | grep -oE '[0-9]{8,}' | tail -1)
          if [ -z "$RUN_ID" ]; then
            echo "ERROR: Could not extract run ID from input" >&2
            exit 1
          fi
          # Validate dev_repo format: owner/repo with only safe characters
          if ! echo "$INPUT_DEV_REPO" | grep -qE '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$'; then
            echo "ERROR: dev_repo must be in owner/repo format" >&2
            exit 1
          fi
          echo "RUN_ID=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "DEV_REPO=$INPUT_DEV_REPO" >> "$GITHUB_OUTPUT"
          echo "Run ID: $RUN_ID  |  Dev Repo: $INPUT_DEV_REPO"

      - name: Extract EMAIL_TO from AppConstants.java (line 210)
        id: email_config
        run: |
          EMAIL_TO=$(grep 'public static final String EMAIL_TO' src/main/java/com/egalvanic/constants/AppConstants.java | grep -v '^\s*//' | sed 's/.*"\(.*\)".*/\1/' | sed 's/,[[:space:]]*$//')
          echo "EMAIL_TO=$EMAIL_TO" >> "$GITHUB_OUTPUT"
          echo "Recipients: $EMAIL_TO"

      - name: Fetch run metadata from dev repo
        id: run_info
        env:
          GH_TOKEN: ${{ secrets.DEV_REPO_TOKEN }}
          RUN_ID: ${{ steps.parse.outputs.RUN_ID }}
          DEV_REPO: ${{ steps.parse.outputs.DEV_REPO }}
        run: |
          gh api "repos/$DEV_REPO/actions/runs/$RUN_ID" > run.json

          CONCLUSION=$(jq -r '.conclusion // "in_progress"' run.json)
          BRANCH=$(jq -r '.head_branch' run.json)
          ACTOR=$(jq -r '.actor.login' run.json)
          URL=$(jq -r '.html_url' run.json)
          NAME=$(jq -r '.name' run.json)

          {
            echo "CONCLUSION=$CONCLUSION"
            echo "BRANCH=$BRANCH"
            echo "ACTOR=$ACTOR"
            echo "URL=$URL"
            echo "NAME=$NAME"
          } >> "$GITHUB_OUTPUT"

          echo "Branch: $BRANCH  |  Conclusion: $CONCLUSION  |  Actor: $ACTOR"

      - name: Download artifacts from dev repo run
        env:
          GH_TOKEN: ${{ secrets.DEV_REPO_TOKEN }}
          RUN_ID: ${{ steps.parse.outputs.RUN_ID }}
          DEV_REPO: ${{ steps.parse.outputs.DEV_REPO }}
        run: |
          mkdir -p artifacts
          cd artifacts
          gh run download "$RUN_ID" --repo "$DEV_REPO" 2>&1 || echo "WARN: some artifacts unavailable"

          echo "Downloaded files (first 30):"
          find . -type f | head -30

      - name: Parse test counts from TestNG XML (across all suites)
        id: counts
        run: |
          # Aggregate counts across every testng-results.xml in the artifacts tree.
          # Single-suite parsing was wrong for parallel runs because it picked
          # ONE suite's numbers as if they were the whole run.
          PASSED=0; FAILED=0; SKIPPED=0; TOTAL=0
          for XML in $(find artifacts -name "testng-results.xml"); do
            P=$(sed -n 's/.*passed="\([^"]*\)".*/\1/p' "$XML" | head -1)
            F=$(sed -n 's/.*failed="\([^"]*\)".*/\1/p' "$XML" | head -1)
            S=$(sed -n 's/.*skipped="\([^"]*\)".*/\1/p' "$XML" | head -1)
            T=$(sed -n 's/.*total="\([^"]*\)".*/\1/p' "$XML" | head -1)
            PASSED=$((PASSED + ${P:-0}))
            FAILED=$((FAILED + ${F:-0}))
            SKIPPED=$((SKIPPED + ${S:-0}))
            TOTAL=$((TOTAL + ${T:-0}))
            echo "  $XML → P=${P:-0} F=${F:-0} S=${S:-0} T=${T:-0}"
          done

          {
            echo "PASSED=$PASSED"
            echo "FAILED=$FAILED"
            echo "SKIPPED=$SKIPPED"
            echo "TOTAL=$TOTAL"
          } >> "$GITHUB_OUTPUT"

          echo "AGGREGATE: $PASSED passed, $FAILED failed, $SKIPPED skipped (of $TOTAL total)"

      - name: Generate Consolidated HTML Report
        id: gen_report
        env:
          RUN_ID: ${{ steps.parse.outputs.RUN_ID }}
          DEV_REPO: ${{ steps.parse.outputs.DEV_REPO }}
          BRANCH: ${{ steps.run_info.outputs.BRANCH }}
        run: |
          # Generate a single consolidated HTML report from all artifact subfolders
          mkdir -p output
          OUT="output/Consolidated_Client_Report.html"
          python3 scripts/generate_consolidated_report.py \
            --artifacts-dir artifacts \
            --output "$OUT" \
            --run-id "$RUN_ID" \
            --branch "$BRANCH" \
            --repo "$DEV_REPO"
          echo "REPORT_PATH=$OUT" >> "$GITHUB_OUTPUT"
          ls -la "$OUT"

      - name: Upload Consolidated Report as Artifact (downloadable from Actions UI)
        uses: actions/upload-artifact@v4
        with:
          name: Consolidated_Client_Report
          path: output/Consolidated_Client_Report.html
          retention-days: 90
          if-no-files-found: error

      - name: Send Email Report
        id: send_email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ steps.email_config.outputs.EMAIL_TO }}
          from: iOS Automation <${{ secrets.EMAIL_USERNAME }}>
          subject: iOS Automation — ${{ steps.run_info.outputs.NAME }} (${{ steps.run_info.outputs.BRANCH }}) — ${{ steps.counts.outputs.PASSED }} Passed / ${{ steps.counts.outputs.FAILED }} Failed
          body: |
            iOS Automation Test Results
            ============================

            Repository:    ${{ steps.parse.outputs.DEV_REPO }}
            Branch:        ${{ steps.run_info.outputs.BRANCH }}
            Workflow:      ${{ steps.run_info.outputs.NAME }}
            Triggered by:  ${{ steps.run_info.outputs.ACTOR }}
            Conclusion:    ${{ steps.run_info.outputs.CONCLUSION }}

            Test Summary (aggregated across all suites):
              - Passed:   ${{ steps.counts.outputs.PASSED }}
              - Failed:   ${{ steps.counts.outputs.FAILED }}
              - Skipped:  ${{ steps.counts.outputs.SKIPPED }}
              - Total:    ${{ steps.counts.outputs.TOTAL }}

            Dev Repo Run:        ${{ steps.run_info.outputs.URL }}
            This Workflow Run:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Download the consolidated HTML report:
              ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts

            The consolidated report is also attached to this email.
          attachments: ${{ steps.gen_report.outputs.REPORT_PATH }}

      - name: Diagnostic Summary
        if: always()
        env:
          OUTCOME: ${{ steps.send_email.outcome }}
          EMAIL_TO_USED: ${{ steps.email_config.outputs.EMAIL_TO }}
          RUN_ID: ${{ steps.parse.outputs.RUN_ID }}
          DEV_REPO: ${{ steps.parse.outputs.DEV_REPO }}
          BRANCH: ${{ steps.run_info.outputs.BRANCH }}
          PASSED: ${{ steps.counts.outputs.PASSED }}
          FAILED: ${{ steps.counts.outputs.FAILED }}
          THIS_RUN: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo "╔══════════════════════════════════════════════════════════════════════╗"
          echo "║    EMAIL + CONSOLIDATED REPORT FOR DEV REPO RUN                      ║"
          echo "╠══════════════════════════════════════════════════════════════════════╣"
          echo "║  Dev Repo:        $DEV_REPO"
          echo "║  Source Run ID:   $RUN_ID"
          echo "║  Branch:          $BRANCH"
          echo "║  Aggregate:       $PASSED passed, $FAILED failed"
          echo "║"
          echo "║  Email outcome:   $OUTCOME"
          echo "║  Email to:        $EMAIL_TO_USED"
          echo "║  Source of email: AppConstants.java line 210"
          echo "║"
          echo "║  📥 Download consolidated HTML report from this run's Artifacts:"
          echo "║     $THIS_RUN"
          echo "║     (scroll to bottom → 'Consolidated_Client_Report' artifact)"
          echo "╚══════════════════════════════════════════════════════════════════════╝"
