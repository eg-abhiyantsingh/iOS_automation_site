name: "Smoke 5 — fast validation of root-cause fixes"

# Runs only 5 strategic tests to validate the SHA-current-main fixes.
# Optimized for FAST startup:
#   * Maven dependency cache (actions/cache built into setup-java)
#   * WebDriverAgent derived-data cache (~3 min saved on warm runs)
#   * Appium global modules cache (~30 sec saved)
#   * Boot simulator + install Appium run in PARALLEL via & (saves ~1 min)
#   * usePreinstalledWDA capability when cache hits
#   * useNewWDA=false → reuse running WDA across the 5 tests
#
# Triggered manually via workflow_dispatch.

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Single source of truth — bump WDA_CACHE_VERSION to invalidate when Appium upgrades
  WDA_CACHE_VERSION: v3

jobs:
  smoke-5:
    name: "Smoke 5 (Auth + SiteSelect + Issues + Asset + Offline)"
    runs-on: macos-15
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ---- WDA + Appium caches (the big speed-up) ----
      - name: Cache Appium global modules
        id: appium-cache
        uses: actions/cache@v4
        with:
          path: |
            /Users/runner/.npm
            /Users/runner/.appium
            /opt/homebrew/lib/node_modules/appium
          key: appium-${{ env.WDA_CACHE_VERSION }}-${{ runner.os }}

      - name: Cache WebDriverAgent derived data
        id: wda-cache
        uses: actions/cache@v4
        with:
          path: |
            /tmp/wda-build
          key: wda-build-${{ env.WDA_CACHE_VERSION }}-${{ runner.os }}-macos15

      - name: Install Appium (skip if cached)
        if: steps.appium-cache.outputs.cache-hit != 'true'
        run: |
          npm install -g appium@next > /dev/null 2>&1
          appium driver install xcuitest > /dev/null 2>&1
          echo "Appium $(appium --version) installed"

      - name: Verify Appium ready
        run: |
          if ! command -v appium >/dev/null 2>&1; then
            echo "Appium not on PATH after cache restore — re-installing"
            npm install -g appium@next > /dev/null 2>&1
            appium driver install xcuitest > /dev/null 2>&1
          fi
          appium --version

      # ---- Parallel prep: unzip app + boot sim simultaneously ----
      - name: Unzip App + Boot Simulator (parallel)
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          # Background: unzip app (~3 sec)
          (
            unzip -o "$WORKSPACE/apps/Z-Platform-QA.zip" -d "$WORKSPACE/apps/" > /dev/null
            if [ -d "$WORKSPACE/apps/Z-Platform-QA.app" ] && [ ! -d "$WORKSPACE/apps/Z Platform-QA.app" ]; then
              mv "$WORKSPACE/apps/Z-Platform-QA.app" "$WORKSPACE/apps/Z Platform-QA.app"
            fi
            echo "[bg] App unzipped"
          ) &
          UNZIP_PID=$!

          # Foreground: boot simulator
          UDID=$(xcrun simctl list devices available | grep -A 100 "iOS 18" | grep "iPhone 16 Pro" | head -1 | awk -F '[()]' '{print $2}')
          [ -z "$UDID" ] && UDID=$(xcrun simctl list devices available | grep -E "iPhone 16 Pro" | head -1 | awk -F '[()]' '{print $2}')
          [ -z "$UDID" ] && UDID=$(xcrun simctl list devices available | grep -E "iPhone 1[5-6]" | head -1 | awk -F '[()]' '{print $2}')
          [ -z "$UDID" ] && echo "No simulator" && exit 1
          xcrun simctl shutdown "$UDID" 2>/dev/null || true
          xcrun simctl boot "$UDID" 2>/dev/null || true
          # Faster boot wait — poll 2s instead of 5s
          ELAPSED=0
          while [ $ELAPSED -lt 180 ]; do
            if xcrun simctl list devices | grep "$UDID" | grep -q "(Booted)"; then
              echo "Sim booted in ${ELAPSED}s"
              break
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done
          [ $ELAPSED -ge 180 ] && exit 1
          # Wait for app unzip to finish if still running
          wait "$UNZIP_PID" 2>/dev/null || true

          DEVICE=$(xcrun simctl list devices available | grep "$UDID" | awk -F '(' '{print $1}' | xargs)
          VERSION=$(xcrun simctl list devices available | grep -B 50 "$UDID" | grep "-- iOS" | tail -1 | sed 's/.*iOS \([0-9.]*\).*/\1/')
          [ -z "$VERSION" ] && VERSION="18.5"
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"
          echo "DEVICE_NAME=$DEVICE" >> "$GITHUB_ENV"
          echo "PLATFORM_VERSION=$VERSION" >> "$GITHUB_ENV"
          # Shorter settle — 15s instead of 30s
          sleep 15

      - name: Pre-install App + Pre-build WDA (parallel)
        env:
          WORKSPACE: ${{ github.workspace }}
          SIM_UDID: ${{ env.SIMULATOR_UDID }}
          WDA_CACHE_HIT: ${{ steps.wda-cache.outputs.cache-hit }}
        run: |
          # Background: install our app to the sim
          (
            xcrun simctl install "$SIM_UDID" "$WORKSPACE/apps/Z Platform-QA.app"
            echo "[bg] App installed to sim"
          ) &
          INSTALL_PID=$!

          # Foreground: build (or restore) WDA
          if [ "$WDA_CACHE_HIT" = "true" ] && [ -d /tmp/wda-build ]; then
            echo "WDA derived-data cache HIT — skipping rebuild"
          else
            echo "WDA cache MISS — building"
            WDA_PATH=$(find ~/.appium -name "WebDriverAgent.xcodeproj" -type f 2>/dev/null | head -1 | xargs dirname)
            if [ -n "$WDA_PATH" ]; then
              cd "$WDA_PATH"
              xcodebuild build-for-testing -project WebDriverAgent.xcodeproj -scheme WebDriverAgentRunner -destination "platform=iOS Simulator,id=$SIM_UDID" -derivedDataPath /tmp/wda-build -quiet || true
            fi
          fi
          wait "$INSTALL_PID" 2>/dev/null || true

      - name: Start Appium Server
        run: |
          appium --relaxed-security --log-level error > appium.log 2>&1 &
          for i in {1..30}; do
            [ "$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4723/status 2>/dev/null)" = "200" ] && break
            sleep 1
          done

      # Only warm WDA if we didn't restore a cached build
      - name: Warm-up WDA Session (skipped if cache hit)
        if: steps.wda-cache.outputs.cache-hit != 'true'
        env:
          WORKSPACE: ${{ github.workspace }}
          SIM_UDID: ${{ env.SIMULATOR_UDID }}
          DEV_NAME: ${{ env.DEVICE_NAME }}
          PLAT_VER: ${{ env.PLATFORM_VERSION }}
        run: |
          APP_PATH="$WORKSPACE/apps/Z Platform-QA.app"
          for attempt in 1 2; do
            SESSION_RESPONSE=$(curl -s -X POST http://127.0.0.1:4723/session \
              -H "Content-Type: application/json" \
              -d "{\"capabilities\":{\"alwaysMatch\":{\"platformName\":\"iOS\",\"appium:automationName\":\"XCUITest\",\"appium:deviceName\":\"$DEV_NAME\",\"appium:udid\":\"$SIM_UDID\",\"appium:platformVersion\":\"$PLAT_VER\",\"appium:app\":\"$APP_PATH\",\"appium:wdaLaunchTimeout\":600000,\"appium:wdaConnectionTimeout\":300000,\"appium:useNewWDA\":false,\"appium:noReset\":false,\"appium:derivedDataPath\":\"/tmp/wda-build\"}}}" \
              --max-time 600 2>&1) || true
            SESSION_ID=$(echo "$SESSION_RESPONSE" | grep -o '"sessionId":"[^"]*"' | cut -d'"' -f4 || true)
            if [ -n "$SESSION_ID" ]; then
              sleep 4
              curl -s -X DELETE "http://127.0.0.1:4723/session/$SESSION_ID" || true
              sleep 3
              echo "WDA warmed up on attempt $attempt"
              break
            fi
            [ $attempt -lt 2 ] && sleep 15
          done

      - name: Run 5 Smoke Tests
        continue-on-error: true
        env:
          WORKSPACE: ${{ github.workspace }}
          SIM_UDID: ${{ env.SIMULATOR_UDID }}
          DEV_NAME: ${{ env.DEVICE_NAME }}
          PLAT_VER: ${{ env.PLATFORM_VERSION }}
        run: |
          APP_PATH="$WORKSPACE/apps/Z Platform-QA.app"
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist" 2>/dev/null || echo "com.egalvanic.zplatform-QA")
          echo "Bundle ID: $BUNDLE_ID"
          TESTS="AuthenticationTest#TC01_verifyWelcomeScreenUILoads"
          TESTS="$TESTS,SiteSelectionTest#TC_SS_001_verifySelectSiteScreenUIElements"
          TESTS="$TESTS,Issue_Phase1_Test#TC_ISS_001_verifyIssuesScreenHeaderElements"
          TESTS="$TESTS,Asset_Phase1_Test#ATS_ECR_01_verifyNewAssetScreenLoadsSuccessfully"
          TESTS="$TESTS,OfflineTest#TC_OFF_001_verifyGoOfflineButtonOnSiteDashboard"
          mvn -B -q test -Dtest="$TESTS" \
            -DDEVICE_NAME="$DEV_NAME" \
            -DPLATFORM_VERSION="$PLAT_VER" \
            -DSIMULATOR_UDID="$SIM_UDID" \
            -DAPP_BUNDLE_ID="$BUNDLE_ID" \
            -DAPP_PATH="$APP_PATH"

      - name: Summarize Results
        if: always()
        run: |
          echo ""
          echo "============================================================"
          echo "                    SMOKE 5 RESULTS"
          echo "============================================================"
          if [ -f target/surefire-reports/testng-results.xml ]; then
            python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET
          r = ET.parse('target/surefire-reports/testng-results.xml').getroot()
          passed = int(r.get('passed', 0))
          failed = int(r.get('failed', 0))
          skipped = int(r.get('skipped', 0))
          total = passed + failed + skipped
          print(f'  Total:   {total}')
          print(f'  Passed:  {passed}')
          print(f'  Failed:  {failed}')
          print(f'  Skipped: {skipped}')
          print()
          if failed > 0:
              print('FAILED TESTS:')
              for tm in r.iter('test-method'):
                  if tm.get('status') == 'FAIL' and tm.get('is-config') != 'true':
                      name = tm.get('name', 'unknown')
                      exc = tm.find('.//exception/message')
                      msg = (exc.text or '').strip().split('\n')[0][:140] if exc is not None else '(no message)'
                      print(f'  FAIL {name}')
                      print(f'       {msg}')
          PYEOF
          else
            echo "(No testng-results.xml — test run may have failed before reporting)"
          fi

      - name: Upload Reports + Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-5-report
          path: |
            target/surefire-reports/
            reports/
            screenshots/
            appium.log
          retention-days: 7
          if-no-files-found: warn
