name: "Smoke 5 — fast validation of root-cause fixes"

# Runs only 5 strategic tests to validate the SHA-current-main fixes
# (forceEnglishViaSettings, Quick Actions card nav, i18n widening,
# offline sim selection, login regression fix). ~10-15 min total.
#
# Triggered manually via workflow_dispatch — does NOT run on push.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-5:
    name: "Smoke 5 (Auth + SiteSelect + Issues + Asset + Offline)"
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Appium
        run: |
          npm install -g appium@next > /dev/null 2>&1
          appium driver install xcuitest > /dev/null 2>&1
          echo "Appium $(appium --version) ready"

      - name: Unzip App
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          unzip -o "$WORKSPACE/apps/Z-Platform-QA.zip" -d "$WORKSPACE/apps/"
          if [ -d "$WORKSPACE/apps/Z-Platform-QA.app" ] && [ ! -d "$WORKSPACE/apps/Z Platform-QA.app" ]; then
            mv "$WORKSPACE/apps/Z-Platform-QA.app" "$WORKSPACE/apps/Z Platform-QA.app"
          fi
          ls -la "$WORKSPACE/apps/"

      - name: Boot Simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep -A 100 "iOS 18" | grep "iPhone 16 Pro" | head -1 | awk -F '[()]' '{print $2}')
          [ -z "$UDID" ] && UDID=$(xcrun simctl list devices available | grep -E "iPhone 16 Pro" | head -1 | awk -F '[()]' '{print $2}')
          [ -z "$UDID" ] && UDID=$(xcrun simctl list devices available | grep -E "iPhone 1[5-6]" | head -1 | awk -F '[()]' '{print $2}')
          [ -z "$UDID" ] && echo "No simulator" && exit 1
          xcrun simctl shutdown "$UDID" 2>/dev/null || true
          sleep 3
          xcrun simctl boot "$UDID" 2>/dev/null || true
          ELAPSED=0
          while [ $ELAPSED -lt 240 ]; do
            if xcrun simctl list devices | grep "$UDID" | grep -q "(Booted)"; then
              echo "Simulator booted after ${ELAPSED}s"
              sleep 30
              break
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          [ $ELAPSED -ge 240 ] && exit 1
          DEVICE=$(xcrun simctl list devices available | grep "$UDID" | awk -F '(' '{print $1}' | xargs)
          VERSION=$(xcrun simctl list devices available | grep -B 50 "$UDID" | grep "-- iOS" | tail -1 | sed 's/.*iOS \([0-9.]*\).*/\1/')
          [ -z "$VERSION" ] && VERSION="18.5"
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"
          echo "DEVICE_NAME=$DEVICE" >> "$GITHUB_ENV"
          echo "PLATFORM_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Pre-install App
        env:
          WORKSPACE: ${{ github.workspace }}
          SIM_UDID: ${{ env.SIMULATOR_UDID }}
        run: xcrun simctl install "$SIM_UDID" "$WORKSPACE/apps/Z Platform-QA.app"

      - name: Pre-build WebDriverAgent
        env:
          SIM_UDID: ${{ env.SIMULATOR_UDID }}
        run: |
          WDA_PATH=$(find ~/.appium -name "WebDriverAgent.xcodeproj" -type f 2>/dev/null | head -1 | xargs dirname)
          if [ -n "$WDA_PATH" ]; then
            cd "$WDA_PATH"
            xcodebuild build-for-testing -project WebDriverAgent.xcodeproj -scheme WebDriverAgentRunner -destination "platform=iOS Simulator,id=$SIM_UDID" -derivedDataPath /tmp/wda-build -quiet || true
          fi

      - name: Start Appium Server
        run: |
          appium --relaxed-security --log-level error > appium.log 2>&1 &
          for i in {1..60}; do
            [ "$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4723/status 2>/dev/null)" = "200" ] && break
            sleep 2
          done
          sleep 5

      - name: Warm-up WDA Session
        env:
          WORKSPACE: ${{ github.workspace }}
          SIM_UDID: ${{ env.SIMULATOR_UDID }}
          DEV_NAME: ${{ env.DEVICE_NAME }}
          PLAT_VER: ${{ env.PLATFORM_VERSION }}
        run: |
          APP_PATH="$WORKSPACE/apps/Z Platform-QA.app"
          for attempt in 1 2 3; do
            SESSION_RESPONSE=$(curl -s -X POST http://127.0.0.1:4723/session \
              -H "Content-Type: application/json" \
              -d "{\"capabilities\":{\"alwaysMatch\":{\"platformName\":\"iOS\",\"appium:automationName\":\"XCUITest\",\"appium:deviceName\":\"$DEV_NAME\",\"appium:udid\":\"$SIM_UDID\",\"appium:platformVersion\":\"$PLAT_VER\",\"appium:app\":\"$APP_PATH\",\"appium:wdaLaunchTimeout\":600000,\"appium:wdaConnectionTimeout\":300000,\"appium:useNewWDA\":false,\"appium:noReset\":false}}}" \
              --max-time 600 2>&1) || true
            SESSION_ID=$(echo "$SESSION_RESPONSE" | grep -o '"sessionId":"[^"]*"' | cut -d'"' -f4 || true)
            if [ -n "$SESSION_ID" ]; then
              sleep 8
              curl -s -X DELETE "http://127.0.0.1:4723/session/$SESSION_ID" || true
              sleep 5
              echo "WDA warmed up on attempt $attempt"
              break
            fi
            [ $attempt -lt 3 ] && sleep 20
          done

      - name: Run 5 Smoke Tests
        continue-on-error: true
        env:
          WORKSPACE: ${{ github.workspace }}
          SIM_UDID: ${{ env.SIMULATOR_UDID }}
          DEV_NAME: ${{ env.DEVICE_NAME }}
          PLAT_VER: ${{ env.PLATFORM_VERSION }}
        run: |
          APP_PATH="$WORKSPACE/apps/Z Platform-QA.app"
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist" 2>/dev/null || echo "com.egalvanic.zplatform-QA")
          echo "Bundle ID: $BUNDLE_ID"
          # 5 strategic tests covering all major fix areas
          TESTS="AuthenticationTest#TC01_verifyWelcomeScreenUILoads"
          TESTS="$TESTS,SiteSelectionTest#TC_SS_001_verifySelectSiteScreenUIElements"
          TESTS="$TESTS,Issue_Phase1_Test#TC_ISS_001_verifyIssuesScreenHeaderElements"
          TESTS="$TESTS,Asset_Phase1_Test#ATS_ECR_01_verifyNewAssetScreenLoadsSuccessfully"
          TESTS="$TESTS,OfflineTest#TC_OFF_001_verifyGoOfflineButtonOnSiteDashboard"
          mvn -B -q test -Dtest="$TESTS" \
            -DDEVICE_NAME="$DEV_NAME" \
            -DPLATFORM_VERSION="$PLAT_VER" \
            -DSIMULATOR_UDID="$SIM_UDID" \
            -DAPP_BUNDLE_ID="$BUNDLE_ID" \
            -DAPP_PATH="$APP_PATH"

      - name: Summarize Results
        if: always()
        run: |
          echo ""
          echo "============================================================"
          echo "                    SMOKE 5 RESULTS"
          echo "============================================================"
          if [ -f target/surefire-reports/testng-results.xml ]; then
            python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET
          r = ET.parse('target/surefire-reports/testng-results.xml').getroot()
          passed = int(r.get('passed', 0))
          failed = int(r.get('failed', 0))
          skipped = int(r.get('skipped', 0))
          total = passed + failed + skipped
          print(f'  Total:   {total}')
          print(f'  Passed:  {passed}')
          print(f'  Failed:  {failed}')
          print(f'  Skipped: {skipped}')
          print()
          if failed > 0:
              print('FAILED TESTS:')
              for tm in r.iter('test-method'):
                  if tm.get('status') == 'FAIL' and tm.get('is-config') != 'true':
                      name = tm.get('name', 'unknown')
                      exc = tm.find('.//exception/message')
                      msg = (exc.text or '').strip().split('\n')[0][:140] if exc is not None else '(no message)'
                      print(f'  FAIL {name}')
                      print(f'       {msg}')
          PYEOF
          else
            echo "(No testng-results.xml — test run may have failed before reporting)"
          fi

      - name: Upload Reports + Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-5-report
          path: |
            target/surefire-reports/
            reports/
            screenshots/
          retention-days: 7
          if-no-files-found: warn
