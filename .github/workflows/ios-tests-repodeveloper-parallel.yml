name: Automation Test - Parallel

# ============================================================
# DEVELOPER REPO - FULL PARALLEL TEST SUITE
# ============================================================
# Builds iOS app from selected branch, then runs all test
# modules in parallel across 13 separate macOS runners.
#
# Architecture:
#   Job 0:  build-app          → Build iOS app from source (1 runner)
#   Job 1:  smoke-tests        → Smoke CRUD: Login + Site + Asset + Location + Connection + Issue (17 tests)
#   Job 2:  auth-tests         → Authentication (38 tests)
#   Job 3:  site-tests         → Site Selection (52 tests)
#   Job 4:  assets-part1       → P1: Creation + Edit + Busway + Capacitor + P5: Bug Tests (112 tests)
#   Job 5:  assets-part2       → P1: CB + DS + Fuse + P2: Generator + Junction Box (108 tests)
#   Job 6:  assets-part3       → P2: Load Center + MCC + MCC Bucket + Motor + Other (109 tests)
#   Job 7:  assets-part4       → P2: OCP + P3: Panelboard + PDU + Relay + SWB + Transformer (97 tests)
#   Job 8:  assets-part5       → P3: UPS + Utility + VFD + Subtypes + P4: DS/Fuse Subtypes (112 tests)
#   Job 9:  assets-part6       → P4: Subtypes + Tasks + Issues + Connections + Asset Screen (114 tests)
#   Job 10: issues-phase1      → Issues Phase 1: List + Filter + Search + Creation + Class Change (119 tests)
#   Job 11: issues-phase2      → Issues Phase 2: OSHA + Thermal + Severity + Temperature + Ultrasonic (60 tests)
#   Job 12: issues-phase3      → Issues Phase 3: Ultrasonic Save + Swipe Delete + Sort + Status + CRUD (58 tests)
#   Job 13: location-tests     → Locations (82 tests)
#   Job 14: connections-tests  → Connections (94 tests)
#   Job 15: offline-tests      → Offline Mode (35 tests)
#   Job 16: summary            → Aggregate results + email
#
# Total: ~1190 tests, ~2.5 hr wall clock (parallel)
# Asset tests (652) split into 6 balanced parts for even CI/CD load
# Issues tests (237) split into 3 phases for even CI/CD load
#
# Requirements:
#   Secrets: QA_REPO_TOKEN, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
#            EMAIL_USERNAME, EMAIL_PASSWORD, EMAIL_TO
# ============================================================

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build and test'
        required: true
        default: 'release/qa'
        type: choice
        options:
          - main
          - release/dev
          - release/qa
          - release/stage
          - release/prod
      job_selection:
        description: 'Which jobs to run'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'smoke'
          - 'authentication-only'
          - 'site-selection-only'
          - 'assets-p1-creation-edit-busway-capacitor-bug'
          - 'assets-p2-cb-ds-fuse-generator-junctionbox'
          - 'assets-p3-loadcenter-mcc-mccbucket-motor-other'
          - 'assets-p4-ocp-panelboard-pdu-relay-swb-transformer'
          - 'assets-p5-ups-utility-vfd-subtypes'
          - 'assets-p6-subtypes-tasks-issues-connections-search'
          - 'issues-p1-list-filter-search-creation-classchange'
          - 'issues-p2-osha-thermal-severity-temperature-ultrasonic'
          - 'issues-p3-ultrasonic-save-swipe-delete-sort-status-crud'
          - 'location-only'
          - 'connections-only'
          - 'offline-only'
          - 'sitevisit-only'
          - 'sitevisit-phase1'
          - 'sitevisit-phase2'
          - 'sitevisit-phase3'

# ============================================================
# JOB 0: Build iOS App from Source
# ============================================================
jobs:
  build-app:
    name: "Build App"
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout iOS App Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          path: ios-app

      - name: Checkout QA Automation Repository
        uses: actions/checkout@v4
        with:
          repository: eg-abhiyantsingh/iOS_automation_site
          token: ${{ secrets.QA_REPO_TOKEN }}
          path: qa-automation

      - name: Set Build Configuration
        run: |
          BRANCH="${{ github.event.inputs.branch }}"

          case "$BRANCH" in
            release/dev)     SCHEME="Egalvanic PZ-Dev" ;;
            release/qa)      SCHEME="Egalvanic PZ-QA" ;;
            release/stage*)  SCHEME="Egalvanic PZ-Staging" ;;
            release/prod|main) SCHEME="Egalvanic PZ" ;;
            *)               SCHEME="Egalvanic PZ-QA" ;;
          esac

          XCODEPROJ=$(find ios-app -name "*.xcodeproj" -type d | head -1)

          echo "BUILD_SCHEME=$SCHEME" >> $GITHUB_ENV
          echo "XCODEPROJ_PATH=$XCODEPROJ" >> $GITHUB_ENV

          echo "📱 Branch: $BRANCH | Scheme: $SCHEME"

      - name: Boot Simulator for Build
        run: |
          UDID=""
          for VERSION in 18.5 18.4 18.3 18.2 18.1 18.0; do
            for MODEL in "iPhone 16 Pro" "iPhone 15 Pro" "iPhone"; do
              UDID=$(xcrun simctl list devices available | grep -A 100 "iOS $VERSION" | grep "$MODEL" | head -1 | awk -F '[()]' '{print $2}')
              [ -n "$UDID" ] && break 2
            done
          done

          if [ -z "$UDID" ]; then
            echo "❌ No iPhone simulator found!"
            xcrun simctl list devices available
            exit 1
          fi

          echo "BUILD_UDID=$UDID" >> $GITHUB_ENV
          echo "📱 Build simulator: $UDID"

          xcrun simctl shutdown "$UDID" 2>/dev/null || true
          sleep 3
          xcrun simctl boot "$UDID" 2>/dev/null || true

          TIMEOUT=120
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            if xcrun simctl list devices | grep "$UDID" | grep -q "(Booted)"; then
              echo "✅ Booted after ${ELAPSED}s"
              break
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

          if [ $ELAPSED -ge $TIMEOUT ]; then echo "❌ Boot timeout"; exit 1; fi

      - name: Resolve Swift Package Dependencies
        run: |
          cd ios-app
          PROJECT_FILE=$(basename "$XCODEPROJ_PATH")
          echo "Resolving SPM dependencies..."
          set +e
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_FILE" \
            -scheme "${{ env.BUILD_SCHEME }}" \
            -clonedSourcePackagesDirPath ../spm-cache \
            > /tmp/spm-resolve.log 2>&1
          SPM_EXIT=$?
          set -e
          if [ "$SPM_EXIT" -ne 0 ]; then
            echo "❌ SPM dependency resolution FAILED (exit code $SPM_EXIT)"
            echo "─── SPM Errors ───"
            grep -i "error:" /tmp/spm-resolve.log | head -20 || true
            echo "─── Full Output (last 30 lines) ───"
            tail -30 /tmp/spm-resolve.log
            cp /tmp/spm-resolve.log "${{ github.workspace }}/spm-error.log" 2>/dev/null || true
            exit 1
          fi
          echo "✅ Dependencies resolved"

      - name: Build iOS App for Simulator
        run: |
          cd ios-app
          PROJECT_FILE=$(basename "$XCODEPROJ_PATH")

          echo "🔨 Building: ${{ env.BUILD_SCHEME }} from ${{ github.event.inputs.branch }}"
          XCODE_VER=$(xcodebuild -version 2>&1 || true)
          SWIFT_VER=$(swift --version 2>&1 || true)
          echo "  Xcode: $(echo "$XCODE_VER" | head -1)"
          echo "  Swift: $(echo "$SWIFT_VER" | head -1)"

          # CI runner (macos-15) has M1 / 3 cores / 7GB RAM — increase Swift
          # type-checker timeout for complex SwiftUI expressions. No pipes on
          # xcodebuild output — causes SIGPIPE / Broken pipe crash.
          cat > /tmp/ci-overrides.xcconfig << 'XCCONFIG'
          // CI build overrides — increase Swift type-checker timeout for slower CI hardware
          OTHER_SWIFT_FLAGS = $(inherited) -Xfrontend -solver-expression-time-threshold -Xfrontend 240
          XCCONFIG

          echo "  Building... (output saved to /tmp/xcodebuild.log)"
          set +e
          xcodebuild build \
            -project "$PROJECT_FILE" \
            -scheme "${{ env.BUILD_SCHEME }}" \
            -destination "platform=iOS Simulator,id=${{ env.BUILD_UDID }}" \
            -derivedDataPath build \
            -clonedSourcePackagesDirPath ../spm-cache \
            -xcconfig /tmp/ci-overrides.xcconfig \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            > /tmp/xcodebuild.log 2>&1
          BUILD_EXIT=$?
          set -e

          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo ""
            echo "╔══════════════════════════════════════════════════════════════╗"
            echo "║  ❌ BUILD FAILED (exit code $BUILD_EXIT)"
            echo "╚══════════════════════════════════════════════════════════════╝"
            echo ""
            echo "─── Swift Compilation Errors ───"
            grep "error:" /tmp/xcodebuild.log | grep -v "^$" | grep -v "Command.*failed" | head -40 || echo "(no error: lines found)"
            echo ""
            echo "─── Build Summary (last 20 lines) ───"
            tail -20 /tmp/xcodebuild.log
            cp /tmp/xcodebuild.log "${{ github.workspace }}/xcodebuild-error.log" 2>/dev/null || true
            exit 1
          fi

          echo "─── Build Output (last 5 lines) ───"
          tail -5 /tmp/xcodebuild.log

          APP_PATH=$(find build -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ Build reported success but no .app found"
            find build -type d | head -20
            exit 1
          fi

          # Verify the executable exists inside the .app bundle
          EXEC_NAME=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_PATH/Info.plist" 2>/dev/null)
          if [ -z "$EXEC_NAME" ] || [ ! -f "$APP_PATH/$EXEC_NAME" ]; then
            echo "❌ App bundle missing executable!"
            echo "  Expected: $APP_PATH/$EXEC_NAME"
            echo "─── App contents ───"
            ls -la "$APP_PATH/"
            exit 1
          fi

          echo "✅ Built: $(basename "$APP_PATH") (exec: $EXEC_NAME)"

          # Copy built app to QA automation directory
          mkdir -p ../qa-automation/apps
          cp -R "$APP_PATH" "../qa-automation/apps/"

      - name: Verify App Configuration
        run: |
          APP_FILE=$(ls qa-automation/apps/ | grep ".app" | head -1)
          APP="qa-automation/apps/$APP_FILE"

          if [ -f "$APP/Info.plist" ]; then
            BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP/Info.plist" 2>/dev/null || echo 'N/A')
            echo "─── Built App Config ───"
            echo "  Bundle ID:    $BUNDLE_ID"
            echo "  API URL:      $(/usr/libexec/PlistBuddy -c 'Print :API_BASE_URL' "$APP/Info.plist" 2>/dev/null || echo 'N/A')"
            echo "  Environment:  $(/usr/libexec/PlistBuddy -c 'Print :ENVIRONMENT_NAME' "$APP/Info.plist" 2>/dev/null || echo 'N/A')"
            echo "  Version:      $(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP/Info.plist" 2>/dev/null || echo 'N/A')"
            # Export bundle ID so tests can use the correct value for terminateApp/activateApp
            echo "APP_BUNDLE_ID=$BUNDLE_ID" >> $GITHUB_ENV
          fi

      - name: Upload Build Log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log-${{ github.run_number }}
          path: xcodebuild-error.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Built App
        uses: actions/upload-artifact@v4
        with:
          name: built-app
          path: qa-automation/apps/
          retention-days: 1

      - name: Upload QA Automation Code
        uses: actions/upload-artifact@v4
        with:
          name: qa-code
          path: |
            qa-automation/src/
            qa-automation/pom.xml
            qa-automation/testng.xml
            qa-automation/testng-smoke.xml
            qa-automation/baselines/
          retention-days: 1

      - name: Shutdown Build Simulator
        if: always()
        run: xcrun simctl shutdown "${{ env.BUILD_UDID }}" 2>/dev/null || true

  # ============================================================
  # JOB 1: Smoke Tests (17 tests, ~15 min)
  # ============================================================
  smoke-tests:
    name: "Smoke - CRUD Tests (17 tests)"
    needs: [build-app]
    if: github.event.inputs.job_selection == 'smoke'
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Download Built App
        uses: actions/download-artifact@v4
        with:
          name: built-app
          path: apps/

      - name: Download QA Automation Code
        uses: actions/download-artifact@v4
        with:
          name: qa-code
          path: qa-automation/

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Appium
        run: |
          npm install -g appium@latest > /dev/null 2>&1
          appium driver install xcuitest > /dev/null 2>&1
          echo "✅ Appium $(appium --version)"

      - name: Boot Simulator
        run: |
          UDID=""
          for VERSION in 18.5 18.4 18.3 18.2 18.1 18.0; do
            for MODEL in "iPhone 16 Pro" "iPhone 15 Pro" "iPhone"; do
              UDID=$(xcrun simctl list devices available | grep -A 100 "iOS $VERSION" | grep "$MODEL" | head -1 | awk -F '[()]' '{print $2}')
              [ -n "$UDID" ] && break 2
            done
          done

          if [ -z "$UDID" ]; then
            echo "❌ No iPhone simulator found!"
            xcrun simctl list devices available
            exit 1
          fi

          DEVICE_NAME=$(xcrun simctl list devices available | grep "$UDID" | sed 's/(.*//' | xargs)
          PLATFORM_VERSION=$(xcrun simctl list devices available | grep -B 20 "$UDID" | grep "iOS" | tail -1 | sed 's/-- iOS //' | sed 's/ --.*//')
          [ -z "$PLATFORM_VERSION" ] && PLATFORM_VERSION="18.5"

          echo "DEVICE_NAME=$DEVICE_NAME" >> $GITHUB_ENV
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          echo "PLATFORM_VERSION=$PLATFORM_VERSION" >> $GITHUB_ENV
          echo "📱 $DEVICE_NAME | iOS $PLATFORM_VERSION | $UDID"

          xcrun simctl shutdown "$UDID" 2>/dev/null || true
          sleep 3
          xcrun simctl boot "$UDID" 2>/dev/null || true

          TIMEOUT=120
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            if xcrun simctl list devices | grep "$UDID" | grep -q "(Booted)"; then
              echo "✅ Booted after ${ELAPSED}s"
              break
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

          if [ $ELAPSED -ge $TIMEOUT ]; then echo "❌ Boot timeout"; exit 1; fi
          sleep 45
          echo "✅ Simulator ready"

      - name: Install App on Simulator
        run: |
          APP_FILE=$(ls apps/ | grep ".app" | head -1)
          xcrun simctl install "${{ env.SIMULATOR_UDID }}" "apps/$APP_FILE"
          echo "✅ App installed: $APP_FILE"

      - name: Pre-build WebDriverAgent
        run: |
          WDA_PATH=$(find ~/.appium -name "WebDriverAgent.xcodeproj" -type f 2>/dev/null | head -1 | xargs dirname)
          if [ -n "$WDA_PATH" ]; then
            cd "$WDA_PATH"
            set +e
            xcodebuild build-for-testing \
              -project WebDriverAgent.xcodeproj \
              -scheme WebDriverAgentRunner \
              -destination "platform=iOS Simulator,id=${{ env.SIMULATOR_UDID }}" \
              -derivedDataPath /tmp/wda-build \
              -quiet > /tmp/wda-build.log 2>&1
            WDA_EXIT=$?
            set -e
            if [ "$WDA_EXIT" -ne 0 ]; then
              echo "⚠️ WDA pre-build failed (exit $WDA_EXIT) — will build on first test run"
              tail -10 /tmp/wda-build.log 2>/dev/null || true
            else
              echo "✅ WDA pre-built"
            fi
          fi

      - name: Start Appium Server
        run: |
          appium --relaxed-security --log-level error > appium.log 2>&1 &
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4723/status 2>/dev/null | grep -q "200"; then
              echo "✅ Appium ready"
              break
            fi
            sleep 2
          done
          sleep 10

      - name: Warm-up WDA Session
        run: |
          APP_FILE=$(ls apps/ | grep ".app" | head -1)
          FULL_APP_PATH="${{ github.workspace }}/apps/$APP_FILE"

          WDA_SUCCESS=false
          for attempt in 1 2 3 4 5; do
            echo "WDA warm-up attempt $attempt/5..."

            # Use fresh WDA on retries to avoid stale state
            if [ $attempt -le 2 ]; then
              USE_NEW_WDA="false"
            else
              USE_NEW_WDA="true"
              echo "  ↳ Using fresh WDA build for attempt $attempt"
            fi
            SESSION_RESPONSE=$(curl -s -X POST http://127.0.0.1:4723/session \
              -H "Content-Type: application/json" \
              -d '{
                "capabilities": {
                  "alwaysMatch": {
                    "platformName": "iOS",
                    "appium:automationName": "XCUITest",
                    "appium:deviceName": "'"${{ env.DEVICE_NAME }}"'",
                    "appium:udid": "'"${{ env.SIMULATOR_UDID }}"'",
                    "appium:platformVersion": "'"${{ env.PLATFORM_VERSION }}"'",
                    "appium:app": "'"$FULL_APP_PATH"'",
                    "appium:wdaLaunchTimeout": 600000,
                    "appium:wdaConnectionTimeout": 300000,
                    "appium:useNewWDA": '"$USE_NEW_WDA"',
                    "appium:noReset": false
                  }
                }
              }' --max-time 600 2>&1) || true

            SESSION_ID=$(echo "$SESSION_RESPONSE" | grep -o '"sessionId":"[^"]*"' | cut -d'"' -f4 || true)

            if [ -n "$SESSION_ID" ]; then
              echo "✅ WDA session OK"
              sleep 10
              curl -s -X DELETE "http://127.0.0.1:4723/session/$SESSION_ID" || true
              sleep 5
              echo "✅ WDA warm-up complete"
              WDA_SUCCESS=true
              break
            else

              echo "  ❌ Attempt $attempt failed. Response:"

              echo "$SESSION_RESPONSE" | head -5

              if [ $attempt -lt 5 ]; then

                echo "  ↳ Retrying in 30s..."

                sleep 30

              fi
            fi
          done

          if [ "$WDA_SUCCESS" = false ]; then
            echo ""
            echo "❌ WDA warm-up FAILED after 5 attempts!"
            echo "─── Appium log (last 50 lines) ───"
            tail -50 appium.log 2>/dev/null || echo "(no appium log)"
            echo "─── Simulator status ───"
            xcrun simctl list devices | grep -A1 "Booted" || echo "(no booted sim)"
            exit 1
          fi

      - name: Run Smoke Tests
        continue-on-error: true
        run: |
          cd qa-automation
          APP_FILE=$(ls ../apps/ | grep ".app" | head -1)
          APP_PATH="${{ github.workspace }}/apps/$APP_FILE"

          # Extract bundle ID from built app so soft restart uses correct ID
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist" 2>/dev/null || echo "com.egalvanic.zplatform-QA")
          echo "📱 Bundle ID: $BUNDLE_ID"

          echo "🧪 Running Smoke CRUD Tests (17 tests)"

          # Login (1 test)
          mvn test -B -q \
            -DsuiteXmlFile=src/test/resources/smoke/testng-smoke-login.xml \
            -DDEVICE_NAME="${{ env.DEVICE_NAME }}" \
            -DPLATFORM_VERSION="${{ env.PLATFORM_VERSION }}" \
            -DSIMULATOR_UDID="${{ env.SIMULATOR_UDID }}" \
            -DAPP_PATH="$APP_PATH" \
            -DAPP_BUNDLE_ID="$BUNDLE_ID" || true

          # Site Selection (1 test)
          mvn test -B -q \
            -DsuiteXmlFile=src/test/resources/smoke/testng-smoke-site-selection.xml \
            -DDEVICE_NAME="${{ env.DEVICE_NAME }}" \
            -DPLATFORM_VERSION="${{ env.PLATFORM_VERSION }}" \
            -DSIMULATOR_UDID="${{ env.SIMULATOR_UDID }}" \
            -DAPP_PATH="$APP_PATH" \
            -DAPP_BUNDLE_ID="$BUNDLE_ID" || true

          # Asset CRUD (4 tests)
          mvn test -B -q \
            -DsuiteXmlFile=src/test/resources/smoke/testng-smoke-asset-crud.xml \
            -DDEVICE_NAME="${{ env.DEVICE_NAME }}" \
            -DPLATFORM_VERSION="${{ env.PLATFORM_VERSION }}" \
            -DSIMULATOR_UDID="${{ env.SIMULATOR_UDID }}" \
            -DAPP_PATH="$APP_PATH" \
            -DAPP_BUNDLE_ID="$BUNDLE_ID" || true

          # Location CRUD (4 tests)
          mvn test -B -q \
            -DsuiteXmlFile=src/test/resources/smoke/testng-smoke-location-crud.xml \
            -DDEVICE_NAME="${{ env.DEVICE_NAME }}" \
            -DPLATFORM_VERSION="${{ env.PLATFORM_VERSION }}" \
            -DSIMULATOR_UDID="${{ env.SIMULATOR_UDID }}" \
            -DAPP_PATH="$APP_PATH" \
            -DAPP_BUNDLE_ID="$BUNDLE_ID" || true

          # Connection CRUD (3 tests)
          mvn test -B -q \
            -DsuiteXmlFile=src/test/resources/smoke/testng-smoke-connection-crud.xml \
            -DDEVICE_NAME="${{ env.DEVICE_NAME }}" \
            -DPLATFORM_VERSION="${{ env.PLATFORM_VERSION }}" \
            -DSIMULATOR_UDID="${{ env.SIMULATOR_UDID }}" \
            -DAPP_PATH="$APP_PATH" \
            -DAPP_BUNDLE_ID="$BUNDLE_ID" || true

          # Issue CRUD (4 tests)
          mvn test -B -q \
            -DsuiteXmlFile=src/test/resources/smoke/testng-smoke-issue-crud.xml \
            -DDEVICE_NAME="${{ env.DEVICE_NAME }}" \
            -DPLATFORM_VERSION="${{ env.PLATFORM_VERSION }}" \
            -DSIMULATOR_UDID="${{ env.SIMULATOR_UDID }}" \
            -DAPP_PATH="$APP_PATH" \
            -DAPP_BUNDLE_ID="$BUNDLE_ID" || true

          echo "✅ Smoke CRUD Tests Complete"

      - name: Upload Smoke Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: |
            qa-automation/target/surefire-reports/
            qa-automation/reports/
            qa-automation/screenshots/
          retention-days: 7

      - name: Upload Appium Log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log-smoke-${{ github.run_number }}
          path: appium.log
          retention-days: 7

      - name: Shutdown Simulator
        if: always()
        run: xcrun simctl shutdown "${{ env.SIMULATOR_UDID }}" 2>/dev/null || true

  # ============================================================
  # JOB 2: Auth Tests (38 tests, ~30 min)
  # ============================================================
  auth-tests:
    name: "Authentication (38 tests)"
    needs: [build-app]
    if: github.event.inputs.job_selection == 'all' || github.event.inputs.job_selection == 'authentication-only'
    runs-on: macos-15
    timeout-minutes: 420

    steps:
      - name: Download Built App
        uses: actions/download-artifact@v4
        with:
          name: built-app
          path: apps/

      - name: Download QA Automation Code
        uses: actions/download-artifact@v4
        with:
          name: qa-code
          path: qa-automation/

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Appium
        run: |
          npm install -g appium@latest > /dev/null 2>&1
          appium driver install xcuitest > /dev/null 2>&1
          echo "✅ Appium $(appium --version)"

      - name: Boot Simulator
        run: |
          UDID=""
          for VERSION in 18.5 18.4 18.3 18.2 18.1 18.0; do
            for MODEL in "iPhone 16 Pro" "iPhone 15 Pro" "iPhone"; do
              UDID=$(xcrun simctl list devices available | grep -A 100 "iOS $VERSION" | grep "$MODEL" | head -1 | awk -F '[()]' '{print $2}')
              [ -n "$UDID" ] && break 2
            done
          done

          if [ -z "$UDID" ]; then
            echo "❌ No iPhone simulator found!"
            xcrun simctl list devices available
            exit 1
          fi

          DEVICE_NAME=$(xcrun simctl list devices available | grep "$UDID" | sed 's/(.*//' | xargs)
          PLATFORM_VERSION=$(xcrun simctl list devices available | grep -B 20 "$UDID" | grep "iOS" | tail -1 | sed 's/-- iOS //' | sed 's/ --.*//')
