  # ============================================================
  # JOB 17: Summary & Email
  # ============================================================
  summary:
    name: "Summary & Email"
    needs: [smoke-tests, auth-tests, site-tests, assets-part1, assets-part2, assets-part3, assets-part4, assets-part5, assets-part6, issues-phase1, issues-phase2, issues-phase3, location-tests, connections-tests, offline-tests, sitevisit-tests]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download All Reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports
        continue-on-error: true

      - name: Prepare Summary
        id: summary
        run: |
          SELECTION="${{ github.event.inputs.job_selection }}"
          SMOKE="${{ needs.smoke-tests.result }}"
          AUTH="${{ needs.auth-tests.result }}"
          SITE="${{ needs.site-tests.result }}"
          AP1="${{ needs.assets-part1.result }}"
          AP2="${{ needs.assets-part2.result }}"
          AP3="${{ needs.assets-part3.result }}"
          AP4="${{ needs.assets-part4.result }}"
          AP5="${{ needs.assets-part5.result }}"
          AP6="${{ needs.assets-part6.result }}"
          ISS1="${{ needs.issues-phase1.result }}"
          ISS2="${{ needs.issues-phase2.result }}"
          ISS3="${{ needs.issues-phase3.result }}"
          LOC="${{ needs.location-tests.result }}"
          CONN="${{ needs.connections-tests.result }}"
          OFFL="${{ needs.offline-tests.result }}"
          SVISIT="${{ needs.sitevisit-tests.result }}"

          if [ "$SELECTION" = "smoke" ]; then
            # ── Smoke mode: only smoke-tests job ran ──
            if [ "$SMOKE" = "success" ]; then
              STATUS="✅ SMOKE PASSED"
              SUCCESS=1; FAILED=0; TOTAL=1
            else
              STATUS="❌ SMOKE FAILED"
              SUCCESS=0; FAILED=1; TOTAL=1
            fi
            echo "SUCCESS=$SUCCESS" >> $GITHUB_OUTPUT
            echo "FAILED=$FAILED" >> $GITHUB_OUTPUT
            echo "TOTAL=$TOTAL" >> $GITHUB_OUTPUT
            echo "STATUS=$STATUS" >> $GITHUB_OUTPUT

            cat > email_body.html << EOF
            <!DOCTYPE html>
            <html>
            <body style="font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto;">
              <h1 style="color: #333;">🧪 iOS Smoke Test Results (Developer Repo)</h1>
              <p><b>Branch:</b> ${{ github.event.inputs.branch }}</p>
              <p><b>Mode:</b> Smoke CRUD (17 tests)</p>
              <p><b>Triggered by:</b> ${{ github.actor }}</p>
              <p><b>Run:</b> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Full Details</a></p>
              <hr>
              <h2>${STATUS}</h2>
              <table border="1" cellpadding="10" style="border-collapse: collapse; width: 100%;">
                <tr style="background-color: #4a90d9; color: white;">
                  <th>Module</th><th>Tests</th><th>Status</th>
                </tr>
                <tr><td>Login</td><td>1</td><td rowspan="6">${SMOKE}</td></tr>
                <tr><td>Site Selection</td><td>1</td></tr>
                <tr><td>Asset CRUD</td><td>4</td></tr>
                <tr><td>Location CRUD</td><td>4</td></tr>
                <tr><td>Connection CRUD</td><td>3</td></tr>
                <tr><td>Issue CRUD</td><td>4</td></tr>
              </table>
              <hr>
              <p><b>Total Smoke Tests:</b> 17</p>
            </body>
            </html>
          EOF
          else
            # ── Full parallel mode: 14 test jobs ──
            SUCCESS=0
            [ "$AUTH" = "success" ] && SUCCESS=$((SUCCESS+1))
            [ "$SITE" = "success" ] && SUCCESS=$((SUCCESS+1))
            [ "$AP1" = "success" ] && SUCCESS=$((SUCCESS+1))
            [ "$AP2" = "success" ] && SUCCESS=$((SUCCESS+1))
            [ "$AP3" = "success" ] && SUCCESS=$((SUCCESS+1))
            [ "$AP4" = "success" ] && SUCCESS=$((SUCCESS+1))
            [ "$AP5" = "success" ] && SUCCESS=$((SUCCESS+1))
            [ "$AP6" = "success" ] && SUCCESS=$((SUCCESS+1))
            [ "$ISS1" = "success" ] && SUCCESS=$((SUCCESS+1))
            [ "$ISS2" = "success" ] && SUCCESS=$((SUCCESS+1))
            [ "$ISS3" = "success" ] && SUCCESS=$((SUCCESS+1))
            [ "$LOC" = "success" ] && SUCCESS=$((SUCCESS+1))
            [ "$CONN" = "success" ] && SUCCESS=$((SUCCESS+1))
            [ "$OFFL" = "success" ] && SUCCESS=$((SUCCESS+1))
            [ "$SVISIT" = "success" ] && SUCCESS=$((SUCCESS+1))

            FAILED=$((15-SUCCESS))
            TOTAL=15
            echo "SUCCESS=$SUCCESS" >> $GITHUB_OUTPUT
            echo "FAILED=$FAILED" >> $GITHUB_OUTPUT
            echo "TOTAL=$TOTAL" >> $GITHUB_OUTPUT

            if [ $SUCCESS -eq 15 ]; then
              STATUS="✅ ALL PASSED"
            elif [ $SUCCESS -ge 13 ]; then
              STATUS="⚠️ MOSTLY PASSED"
            else
              STATUS="❌ FAILED"
            fi
            echo "STATUS=$STATUS" >> $GITHUB_OUTPUT

            # Helper function: convert job result to colored HTML badge
            badge() {
              local result="$1"
              case "$result" in
                success)   echo '<span style="background:#28a745;color:white;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:bold;">✅ PASSED</span>' ;;
                failure)   echo '<span style="background:#dc3545;color:white;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:bold;">❌ FAILED</span>' ;;
                cancelled) echo '<span style="background:#e67e22;color:white;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:bold;">⏱️ TIMEOUT</span>' ;;
                skipped)   echo '<span style="background:#6c757d;color:white;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:bold;">⏭️ SKIPPED</span>' ;;
                *)         echo '<span style="background:#6c757d;color:white;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:bold;">❓ UNKNOWN</span>' ;;
              esac
            }

            # Generate color header based on pass rate
            if [ $SUCCESS -eq 15 ]; then
              HEADER_COLOR="#28a745"
            elif [ $SUCCESS -ge 13 ]; then
              HEADER_COLOR="#e67e22"
            else
              HEADER_COLOR="#dc3545"
            fi

            cat > email_body.html << EOF
            <!DOCTYPE html>
            <html>
            <body style="font-family: 'Segoe UI', Arial, sans-serif; padding: 0; margin: 0; background: #f5f5f5;">
              <div style="background: linear-gradient(135deg, ${HEADER_COLOR} 0%, #333 100%); color: white; padding: 25px; text-align: center;">
                <h1 style="margin: 0; font-size: 22px;">iOS Full Parallel Suite — Developer Repo</h1>
                <p style="margin: 8px 0 0; opacity: 0.9; font-size: 14px;">${STATUS} — ${SUCCESS}/15 Jobs Passed</p>
              </div>

              <div style="max-width: 800px; margin: 20px auto; padding: 0 20px;">
                <table style="width: 100%; margin-bottom: 15px; font-size: 13px;">
                  <tr><td><b>Branch:</b> ${{ github.event.inputs.branch }}</td><td><b>Triggered by:</b> ${{ github.actor }}</td></tr>
                  <tr><td><b>Selection:</b> ${{ github.event.inputs.job_selection }}</td><td><b>Run:</b> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Details</a></td></tr>
                </table>

                <table border="1" cellpadding="8" style="border-collapse: collapse; width: 100%; background: white; font-size: 13px;">
                  <tr style="background-color: #4a90d9; color: white;">
                    <th style="text-align:left;">Job</th><th>Tests</th><th style="text-align:left;">Coverage</th><th>Status</th>
                  </tr>
                  <tr><td>Auth Tests</td><td align="center">38</td><td>Authentication & Login</td><td align="center">$(badge "$AUTH")</td></tr>
                  <tr><td>Site Tests</td><td align="center">52</td><td>Site Selection</td><td align="center">$(badge "$SITE")</td></tr>
                  <tr style="background:#f8f9fa;"><td colspan="4" style="padding:4px 8px;font-weight:bold;color:#555;">Asset Tests (652 tests, 6 parts)</td></tr>
                  <tr><td>Asset Part 1</td><td align="center">112</td><td>Creation + Edit + Busway + Capacitor + Bugs</td><td align="center">$(badge "$AP1")</td></tr>
                  <tr><td>Asset Part 2</td><td align="center">108</td><td>CB + DS + Fuse + Generator + Junction Box</td><td align="center">$(badge "$AP2")</td></tr>
                  <tr><td>Asset Part 3</td><td align="center">109</td><td>Load Center + MCC + MCC Bucket + Motor + Other</td><td align="center">$(badge "$AP3")</td></tr>
                  <tr><td>Asset Part 4</td><td align="center">97</td><td>OCP + Panelboard + PDU + Relay + SWB + Transformer</td><td align="center">$(badge "$AP4")</td></tr>
                  <tr><td>Asset Part 5</td><td align="center">112</td><td>UPS + Utility + VFD + Subtypes + DS/Fuse</td><td align="center">$(badge "$AP5")</td></tr>
                  <tr><td>Asset Part 6</td><td align="center">114</td><td>Subtypes + Tasks + Issues + Connections + Screen</td><td align="center">$(badge "$AP6")</td></tr>
                  <tr style="background:#f8f9fa;"><td colspan="4" style="padding:4px 8px;font-weight:bold;color:#555;">Issues Tests (237 tests, 3 phases)</td></tr>
                  <tr><td>Issues Phase 1</td><td align="center">119</td><td>List + Filter + Search + Creation + Class Change</td><td align="center">$(badge "$ISS1")</td></tr>
                  <tr><td>Issues Phase 2</td><td align="center">60</td><td>OSHA + Thermal + Severity + Temperature + Ultrasonic</td><td align="center">$(badge "$ISS2")</td></tr>
                  <tr><td>Issues Phase 3</td><td align="center">58</td><td>Ultrasonic Save + Swipe Delete + Sort + Status + CRUD</td><td align="center">$(badge "$ISS3")</td></tr>
                  <tr style="background:#f8f9fa;"><td colspan="4" style="padding:4px 8px;font-weight:bold;color:#555;">Other Modules</td></tr>
                  <tr><td>Location</td><td align="center">82</td><td>Location Hierarchy</td><td align="center">$(badge "$LOC")</td></tr>
                  <tr><td>Connections</td><td align="center">94</td><td>Asset Connections</td><td align="center">$(badge "$CONN")</td></tr>
                  <tr><td>Offline</td><td align="center">35</td><td>Offline Mode</td><td align="center">$(badge "$OFFL")</td></tr>
                  <tr><td>Site Visit</td><td align="center">—</td><td>Work Orders / Photo Walkthrough / Files</td><td align="center">$(badge "$SVISIT")</td></tr>
                </table>

                <div style="margin-top: 15px; padding: 12px; background: white; border-radius: 6px; font-size: 13px;">
                  <b>Total Tests:</b> ~1190 | <b>Passed Jobs:</b> ${SUCCESS} | <b>Failed:</b> ${FAILED}
                  <br><span style="color:#e67e22;">⏱️ TIMEOUT</span> = Job exceeded time limit (session expired) — tests that ran before timeout are still valid
                </div>

                <p style="margin-top: 15px; color: #999; font-size: 11px; text-align: center;">
                  eGalvanic iOS Automation Suite — Developer Repo | Asset tests (652) split into 6 parts, Issues (237) into 3 phases
                </p>
              </div>
            </body>
            </html>
          EOF
          fi

      - name: Send Email
        id: send_email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[${{ steps.summary.outputs.STATUS }}] iOS Suite (${{ github.event.inputs.branch }}) - ${{ steps.summary.outputs.SUCCESS }}/${{ steps.summary.outputs.TOTAL }} Passed"
          html_body: file://email_body.html
          to: abhiyant.singh@egalvanic.com
          from: "iOS Automation <${{ secrets.EMAIL_USERNAME }}>"
        continue-on-error: true

      - name: Email Summary
        if: always()
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║    📧  EMAIL REPORT SUMMARY (Developer Repo)               ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          echo "║  Suite Result: ${{ steps.summary.outputs.STATUS }}"
          echo "║  Jobs: ${{ steps.summary.outputs.SUCCESS }}/${{ steps.summary.outputs.TOTAL }} Passed"
          if [ "${{ steps.send_email.outcome }}" = "success" ]; then
            echo "║  Email Send:  ✅ SUCCESS (check Spam/Promotions if not in inbox)"
          else
            echo "║  Email Send:  ❌ FAILED"
            echo "║"
            echo "║  TROUBLESHOOTING:"
            echo "║  1. EMAIL_USERNAME must be a Gmail address"
            echo "║  2. EMAIL_PASSWORD must be a Gmail App Password (NOT regular password)"
            echo "║     → Google Account > Security > 2-Step Verification > App Passwords"
            echo "║  3. EMAIL_TO should be set (falls back to abhiyant.singh@egalvanic.com)"
          fi
          echo "║  To:     abhiyant.singh@egalvanic.com"
          echo "╚════════════════════════════════════════════════════════════╝"

      - name: Print Summary
        run: |
          SELECTION="${{ github.event.inputs.job_selection }}"
          echo ""
          echo "╔══════════════════════════════════════════════════════════════════════════════╗"
          echo "║            DEVELOPER REPO - TEST SUITE COMPLETE                              ║"
          echo "╚══════════════════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  🌿 Branch:      ${{ github.event.inputs.branch }}"
          echo "  🎯 Selection:   ${SELECTION}"
          echo "  📊 Results:     ${{ steps.summary.outputs.SUCCESS }}/${{ steps.summary.outputs.TOTAL }} Passed"
          echo ""

          if [ "$SELECTION" = "smoke" ]; then
            echo "  ─── Smoke CRUD (17 tests) ───"
            echo "  Smoke Tests:            ${{ needs.smoke-tests.result }}"
          else
            echo "  ─── Non-Asset Jobs ───"
            echo "  Auth (38):              ${{ needs.auth-tests.result }}"
            echo "  Site (52):              ${{ needs.site-tests.result }}"
            echo ""
            echo "  ─── Asset Parts (652 tests, 6 balanced parts) ───"
            echo "  Part 1 (112): P1 Creation+Edit+Busway+Cap + P5 Bugs     ${{ needs.assets-part1.result }}"
            echo "  Part 2 (108): P1 CB+DS+Fuse + P2 Gen+JB                 ${{ needs.assets-part2.result }}"
            echo "  Part 3 (109): P2 LC+MCC+MCCB+Motor+Other                ${{ needs.assets-part3.result }}"
            echo "  Part 4 (97):  P2 OCP + P3 PB+PDU+Relay+SWB+TRF         ${{ needs.assets-part4.result }}"
            echo "  Part 5 (112): P3 UPS+UTL+VFD+Subtypes + P4 DS/Fuse ST  ${{ needs.assets-part5.result }}"
            echo "  Part 6 (114): P4 Subtypes+Tasks+Issues+Conn+Screen      ${{ needs.assets-part6.result }}"
            echo ""
            echo "  ─── Issues (237 tests, 3 phases) ───"
            echo "  Phase 1 (119): List+Filter+Search+Creation+ClassChange   ${{ needs.issues-phase1.result }}"
            echo "  Phase 2 (60):  OSHA+Thermal+Severity+Temp+Ultrasonic    ${{ needs.issues-phase2.result }}"
            echo "  Phase 3 (58):  UltraSave+SwipeDel+Sort+Status+CRUD      ${{ needs.issues-phase3.result }}"
            echo ""
            echo "  ─── Other Jobs ───"
            echo "  Location (82):          ${{ needs.location-tests.result }}"
            echo "  Connections (94):       ${{ needs.connections-tests.result }}"
            echo "  Offline (35):           ${{ needs.offline-tests.result }}"
            echo "  Site Visit:             ${{ needs.sitevisit-tests.result }}"
          fi

          echo ""
          echo "  📧 Email: sent to configured recipients"
          echo "  🔗 Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
