name: QA Data Cleanup (automation site)

# Soft-deletes automation debris (epoch-named assets/buildings/floors/rooms/tasks)
# from the automation site via the backend API. See .github/scripts/qa-data-cleanup.py
# for the exact safety rails (strict name patterns, 48h in-flight guard, undo log,
# single hard-coded site). Audited 2026-07-03: months of CI runs had piled up 371
# junk buildings + 361 floors + 596 tasks — the giant-DOM/WDA-wedge root cause.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        # SAFE DEFAULT: manual dispatches audit only; an operator must explicitly
        # untick this to soft-delete. The scheduled weekly run IS live (that is its
        # purpose) — bounded by the script's strict name patterns, the 48h
        # in-flight guard, soft-delete reversibility, and the uploaded undo log.
        description: 'Dry run (audit only, delete nothing). Untick for a LIVE cleanup.'
        default: true
        type: boolean
  schedule:
    # Weekly, Sunday 02:00 UTC — before the work week's runs.
    - cron: '0 2 * * 0'

jobs:
  cleanup:
    name: "Cleanup automation-site test data"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts
            src/main/java/com/egalvanic/constants/AppConstants.java

      - name: Run cleanup
        env:
          # Manual dispatch: honors the dry_run input (defaults to dry-run).
          # Scheduled run: inputs.dry_run is null -> '0' -> live (by design).
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          UNDO_LOG: qa-cleanup-undo.jsonl
          # Optional GitHub secrets override the AppConstants.java fallback.
          QA_API_EMAIL: ${{ secrets.QA_API_EMAIL }}
          QA_API_PASSWORD: ${{ secrets.QA_API_PASSWORD }}
        run: python3 .github/scripts/qa-data-cleanup.py

      - name: Upload undo log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-cleanup-undo-log
          path: qa-cleanup-undo.jsonl
          retention-days: 90
        continue-on-error: true
