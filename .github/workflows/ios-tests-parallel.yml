            echo "✅ Renamed Z-Platform-QA.app → Z Platform-QA.app"
          fi
      - name: Boot Simulator and Wait Until Ready
        run: |
          # Run 29239765283: the runner image ships NO bootable iPad for the
          # iOS 18 runtime — grep found a stale device and `boot || true`
          # swallowed the real error while the poll spun for 9 minutes.
          # CREATE the iPad against the same runtime the iPhone jobs use.
          RUNTIME=$(xcrun simctl list runtimes | grep -E "^iOS 18" | tail -1 | grep -o "com.apple.CoreSimulator.SimRuntime[^ )]*")
          echo "Runtime: $RUNTIME"
          [ -z "$RUNTIME" ] && { xcrun simctl list runtimes; exit 1; }
          UDID=$(xcrun simctl list devices available "$RUNTIME" 2>/dev/null | grep "iPad" | head -1 | awk -F '[()]' '{print $2}')
          if [ -z "$UDID" ]; then
            # Newest device types (M5) are INCOMPATIBLE with the iOS 18 runtime
            # (run 29240604419: create exited 147). Try known-compatible iPads
            # oldest-supported-first until one creates.
            for DT in "iPad Pro 13-inch (M4)" "iPad Air 11-inch (M2)" "iPad (10th generation)" "iPad Pro (12.9-inch) (6th generation)"; do
              DEVTYPE=$(xcrun simctl list devicetypes | grep -F "$DT" | head -1 | grep -o "com.apple.CoreSimulator.SimDeviceType[^ )]*")
              [ -z "$DEVTYPE" ] && continue
              echo "Trying to create iPad: $DEVTYPE on $RUNTIME"
              if UDID=$(xcrun simctl create "QA-iPad" "$DEVTYPE" "$RUNTIME" 2>/dev/null); then
                echo "Created: $UDID ($DT)"
                break
              fi
              UDID=""
            done
          fi
          echo "iPad UDID: $UDID"
          [ -z "$UDID" ] && { xcrun simctl list devices available; exit 1; }
          xcrun simctl shutdown "$UDID" 2>/dev/null || true
          sleep 3
          xcrun simctl boot "$UDID" || { echo "❌ boot failed:"; xcrun simctl list devices | grep -A2 "$UDID"; exit 1; }
          # iPad Pro is heavy to cold-boot on a 3-core runner (run 29236183806
          # burned the whole 240s window): block on bootstatus first (long cap),
          # then fall through to the poll for the Booted flag.
          timeout 480 xcrun simctl bootstatus "$UDID" -b 2>/dev/null || true
          ELAPSED=0
          while [ $ELAPSED -lt 480 ]; do
            if xcrun simctl list devices | grep "$UDID" | grep -q "(Booted)"; then
