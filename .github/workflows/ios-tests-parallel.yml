            SESSION_ID=$(echo "$SESSION_RESPONSE" | grep -o '"sessionId":"[^"]*"' | cut -d'"' -f4 || true)
            if [ -n "$SESSION_ID" ]; then
              sleep 3
              curl -s -X DELETE "http://127.0.0.1:4723/session/$SESSION_ID" || true
              sleep 5
              WDA_SUCCESS=true
              break
            fi
            [ $attempt -lt 5 ] && sleep 30
          done

          if [ "$WDA_SUCCESS" = false ]; then
            echo ""
            echo "❌ WDA warm-up FAILED after 5 attempts!"
            echo "─── Appium log (last 50 lines) ───"
            tail -50 appium.log 2>/dev/null || echo "(no appium log)"
            echo "─── Simulator status ───"
            xcrun simctl list devices | grep -A1 "Booted" || echo "(no booted sim)"
            exit 1
          fi
      - name: Run Connections Tests
        continue-on-error: true
        run: |
          # Extract bundle ID from built app so soft restart uses correct ID
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "${{ github.workspace }}/apps/Z Platform-QA.app/Info.plist" 2>/dev/null || echo "com.egalvanic.zplatform-QA")

          mvn test -ntp -B -DfailIfNoTests=true -DsuiteXmlFile=src/test/resources/parallel/testng-connections.xml \
            -DDEVICE_NAME="${{ env.DEVICE_NAME }}" \
            -DPLATFORM_VERSION="${{ env.PLATFORM_VERSION }}" \
            -DSIMULATOR_UDID="${{ env.SIMULATOR_UDID }}" \
            -DAPP_BUNDLE_ID="$BUNDLE_ID" \
            -DAPP_PATH="${{ github.workspace }}/apps/Z Platform-QA.app"
      - name: Upload Connections Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: connections-report
          path: |
            target/surefire-reports/
            reports/
            screenshots/
          retention-days: 30
      - name: Send Module Email (connections)
        if: always() && github.event.inputs.send_email != 'false'
        env:
          SMTP_USER: ${{ secrets.EMAIL_USERNAME }}
          SMTP_PASS: ${{ secrets.EMAIL_PASSWORD }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          MODULE_NAME: connections
          JOB_STATUS: ${{ job.status }}
        run: |
          # Send a per-module email AS SOON AS this module finishes — no
          # waiting for the global send-email job. User can review the
          # Detailed report via the workflow-artifacts download link
          # immediately on receipt.
          EMAIL_TO=$(grep 'public static final String EMAIL_TO' src/main/java/com/egalvanic/constants/AppConstants.java | grep -v '^\s*//' | sed 's/.*"\(.*\)".*/\1/' | sed 's/,[[:space:]]*$//')
          export EMAIL_TO
          python3 -m pip install --quiet --break-system-packages defusedxml || python3 -m pip install --quiet defusedxml
          python3 .github/scripts/send-module-email.py
        continue-on-error: true
      # Loud gate runs LAST (after report upload + module email) so evidence
      # always ships first. No continue-on-error here: this step is what turns
      # "0 tests ran / tests failed but mvn was tolerated" jobs RED.
      - name: Test Result Gate
        run: bash .github/scripts/test-result-gate.sh target/surefire-reports

  # ========================================
  # JOB 14: Offline Tests (35 tests, ~1 hr)
  # ========================================
  offline-tests:
    name: "Offline (35 tests)"
    if: ${{ inputs.run_all || inputs.run_offline_zp323 }}
    runs-on: macos-15
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Appium
        run: |
          npm install -g appium@next > /dev/null 2>&1
          appium driver install xcuitest > /dev/null 2>&1
          echo "Appium $(appium --version) ready"
      - name: Unzip App (use local apps/Z-Platform-QA.zip, no S3 dependency)
        # Changelog 072: AWS S3 credentials returned 403 Forbidden on run
        # 26038190344. The Offline job was the only one using S3 — every other
        # job in this workflow unzips the committed apps/Z-Platform-QA.zip.
        # Aligning Offline to the same pattern removes the S3 single-point-of-
        # failure and makes the job work without external credentials.
        run: |
          unzip -o apps/Z-Platform-QA.zip -d apps/
          if [ -d "apps/Z-Platform-QA.app" ] && [ ! -d "apps/Z Platform-QA.app" ]; then
            mv "apps/Z-Platform-QA.app" "apps/Z Platform-QA.app"
          fi
          ls -la apps/
          echo "✅ App unzipped from local apps/Z-Platform-QA.zip"
      - name: Boot Simulator
        run: |
          # Search NEWER iOS versions first. macos-15 runner ships 18.5/18.6,
          # not 18.4 or older — the old list ("18.4 18.3 18.2 18.1 18.0") found
          # nothing and the job failed with "No simulator". Walk 19.x first,
          # then 18.6 → 18.0 so we stay resilient to runner image bumps.
          UDID=""
          for VERSION in 19.0 18.6 18.5 18.4 18.3 18.2 18.1 18.0; do
            for MODEL in "iPhone 16 Pro" "iPhone 16" "iPhone 15 Pro" "iPhone 15" "iPhone"; do
              UDID=$(xcrun simctl list devices available | grep -A 100 "iOS $VERSION" | grep "$MODEL" | head -1 | awk -F '[()]' '{print $2}')
              [ -n "$UDID" ] && break 2
            done
          done
          if [ -z "$UDID" ]; then
            echo "::error::No iOS simulator matched any 18.x/19.x version on this runner. Available:"
            xcrun simctl list devices available || true
            exit 1
          fi

          DEVICE_NAME=$(xcrun simctl list devices available | grep "$UDID" | sed 's/(.*//' | xargs)
          PLATFORM_VERSION=$(xcrun simctl list devices available | grep -B 20 "$UDID" | grep "iOS" | tail -1 | sed 's/-- iOS //' | sed 's/ --.*//')
          [ -z "$PLATFORM_VERSION" ] && PLATFORM_VERSION="18.5"
          echo "DEVICE_NAME=$DEVICE_NAME" >> $GITHUB_ENV
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          echo "PLATFORM_VERSION=$PLATFORM_VERSION" >> $GITHUB_ENV

          xcrun simctl shutdown "$UDID" 2>/dev/null || true
          sleep 2
          xcrun simctl boot "$UDID"
          TIMEOUT=120; ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            if xcrun simctl list devices | grep "$UDID" | grep -q "(Booted)"; then break; fi
            sleep 5; ELAPSED=$((ELAPSED + 5))
          done
          sleep 45
          echo "✅ Simulator ready: $DEVICE_NAME (iOS $PLATFORM_VERSION)"
      - name: Install App
        run: |
          APP_FILE=$(ls apps/ | grep ".app" | head -1)
          xcrun simctl install "$SIMULATOR_UDID" "apps/$APP_FILE"
      - name: Pre-build WebDriverAgent
        run: |
          WDA_PATH=$(find ~/.appium -name "WebDriverAgent.xcodeproj" -type d 2>/dev/null | head -1 | xargs dirname)
          if [ -n "$WDA_PATH" ]; then
            cd "$WDA_PATH"
            set +e
            xcodebuild build-for-testing -project WebDriverAgent.xcodeproj -scheme WebDriverAgentRunner \
              -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
              -derivedDataPath /tmp/wda-build -quiet > /tmp/wda-build.log 2>&1
            WDA_EXIT=$?
            set -e
            if [ "$WDA_EXIT" -ne 0 ]; then
              echo "⚠️ WDA pre-build failed (exit $WDA_EXIT) — will build on first test run"
              tail -10 /tmp/wda-build.log 2>/dev/null || true
            else
              echo "✅ WDA pre-built"
            fi
          fi
      - name: Start Appium
        run: |
          appium --relaxed-security --log-level error &
          for i in {1..30}; do curl -s http://127.0.0.1:4723/status | grep -q "ready" && break; sleep 2; done
          sleep 3
      - name: Warm-up WDA Session
        env:
          APP_PATH: ${{ github.workspace }}/apps/Z Platform-QA.app
        run: |
          WDA_SUCCESS=false
          for attempt in 1 2 3 4 5; do
            SESSION_RESPONSE=$(curl -s -X POST http://127.0.0.1:4723/session -H "Content-Type: application/json" -d '{"capabilities":{"alwaysMatch":{"platformName":"iOS","appium:automationName":"XCUITest","appium:deviceName":"'"${{ env.DEVICE_NAME }}"'","appium:udid":"'"$SIMULATOR_UDID"'","appium:platformVersion":"'"${{ env.PLATFORM_VERSION }}"'","appium:app":"'"$APP_PATH"'","appium:wdaLaunchTimeout":600000,"appium:wdaConnectionTimeout":300000,"appium:useNewWDA":false,"appium:noReset":false}}}' --max-time 600 2>&1) || true
            SESSION_ID=$(echo "$SESSION_RESPONSE" | grep -o '"sessionId":"[^"]*"' | cut -d'"' -f4 || true)
            if [ -n "$SESSION_ID" ]; then
              sleep 3
              curl -s -X DELETE "http://127.0.0.1:4723/session/$SESSION_ID" || true
              sleep 5
              WDA_SUCCESS=true
              break
            fi
            [ $attempt -lt 5 ] && sleep 30
          done

          if [ "$WDA_SUCCESS" = false ]; then
            echo ""
            echo "❌ WDA warm-up FAILED after 5 attempts!"
            echo "─── Appium log (last 50 lines) ───"
            tail -50 appium.log 2>/dev/null || echo "(no appium log)"
            echo "─── Simulator status ───"
            xcrun simctl list devices | grep -A1 "Booted" || echo "(no booted sim)"
            exit 1
          fi
      - name: Run Offline Tests
        continue-on-error: true
        run: |
          # Extract bundle ID from built app so soft restart uses correct ID
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "${{ github.workspace }}/apps/Z Platform-QA.app/Info.plist" 2>/dev/null || echo "com.egalvanic.zplatform-QA")

          mvn test -ntp -B -DfailIfNoTests=true -DsuiteXmlFile=src/test/resources/parallel/testng-offline.xml \
            -DDEVICE_NAME="${{ env.DEVICE_NAME }}" \
            -DPLATFORM_VERSION="${{ env.PLATFORM_VERSION }}" \
            -DSIMULATOR_UDID="${{ env.SIMULATOR_UDID }}" \
            -DAPP_BUNDLE_ID="$BUNDLE_ID" \
            -DAPP_PATH="${{ github.workspace }}/apps/Z Platform-QA.app"
      - name: Upload Offline Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: offline-report
          path: |
            target/surefire-reports/
            reports/
            screenshots/
          retention-days: 30
      - name: Send Module Email (offline)
        if: always() && github.event.inputs.send_email != 'false'
        env:
          SMTP_USER: ${{ secrets.EMAIL_USERNAME }}
          SMTP_PASS: ${{ secrets.EMAIL_PASSWORD }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          MODULE_NAME: offline
          JOB_STATUS: ${{ job.status }}
        run: |
          # Send a per-module email AS SOON AS this module finishes — no
          # waiting for the global send-email job. User can review the
          # Detailed report via the workflow-artifacts download link
          # immediately on receipt.
          EMAIL_TO=$(grep 'public static final String EMAIL_TO' src/main/java/com/egalvanic/constants/AppConstants.java | grep -v '^\s*//' | sed 's/.*"\(.*\)".*/\1/' | sed 's/,[[:space:]]*$//')
          export EMAIL_TO
          python3 -m pip install --quiet --break-system-packages defusedxml || python3 -m pip install --quiet defusedxml
          python3 .github/scripts/send-module-email.py
        continue-on-error: true
      # Loud gate runs LAST (after report upload + module email) so evidence
      # always ships first. No continue-on-error here: this step is what turns
      # "0 tests ran / tests failed but mvn was tolerated" jobs RED.
      - name: Test Result Gate
        run: bash .github/scripts/test-result-gate.sh target/surefire-reports

  # ========================================
  # JOB 15: Site Visit / Work Orders
  # ========================================
  sitevisit-tests:
    name: "Site Visit ${{ matrix.phase }}"
    if: ${{ inputs.run_all || inputs.run_sitevisit_workorders }}
    runs-on: macos-15
    timeout-minutes: 360
    # ROOT-CAUSE FIX (run #26641212845): the all-phases mega-suite (344
    # tests, ~5.7h+ sequential) exceeded the 6h wall-clock cap and was
    # CANCELLED — no testng-results.xml was ever written. Split into 3
    # PARALLEL phase jobs so each finishes comfortably under the cap.
    strategy:
      fail-fast: false
      matrix:
        phase: [phase1, phase2, phase3]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Appium
        run: |
          npm install -g appium@next
          appium driver install xcuitest
          echo "✅ Appium $(appium --version) installed"

      - name: Unzip App
        run: |
          unzip -o apps/Z-Platform-QA.zip -d apps/
          if [ -d "apps/Z-Platform-QA.app" ] && [ ! -d "apps/Z Platform-QA.app" ]; then
            mv "apps/Z-Platform-QA.app" "apps/Z Platform-QA.app"
            echo "✅ Renamed Z-Platform-QA.app → Z Platform-QA.app"
          fi
          ls -la apps/

      - name: Boot Simulator and Wait Until Ready
        run: |
          UDID=$(xcrun simctl list devices available | grep -A 100 "iOS 18" | grep "iPhone 16 Pro" | head -1 | awk -F '[()]' '{print $2}')
          [ -z "$UDID" ] && UDID=$(xcrun simctl list devices available | grep -E "iPhone 16 Pro" | head -1 | awk -F '[()]' '{print $2}')
          [ -z "$UDID" ] && UDID=$(xcrun simctl list devices available | grep -E "iPhone 1[5-6]" | head -1 | awk -F '[()]' '{print $2}')

          if [ -z "$UDID" ]; then
            echo "❌ No iPhone simulator found!"
            exit 1
          fi

          xcrun simctl shutdown "$UDID" 2>/dev/null || true
          sleep 3
          xcrun simctl boot "$UDID" 2>/dev/null || true

          BOOT_TIMEOUT=240
          ELAPSED=0
          while [ $ELAPSED -lt $BOOT_TIMEOUT ]; do
            if xcrun simctl list devices | grep "$UDID" | grep -q "(Booted)"; then
              echo "✅ Simulator booted after ${ELAPSED}s"
              # bootstatus blocks until boot fully completes (usually <15s) — was a fixed 45s sleep
              xcrun simctl bootstatus "$UDID" -b 2>/dev/null || sleep 20
              echo "✅ Simulator ready"
              break
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

          if [ $ELAPSED -ge $BOOT_TIMEOUT ]; then
            echo "❌ Simulator failed to boot"
            exit 1
          fi

          DEVICE=$(xcrun simctl list devices available | grep "$UDID" | awk -F '(' '{print $1}' | xargs)
          VERSION=$(xcrun simctl list devices available | grep -B 50 "$UDID" | grep "-- iOS" | tail -1 | sed 's/.*iOS \([0-9.]*\).*/\1/')
          [ -z "$VERSION" ] && VERSION="18.5"

          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          echo "DEVICE_NAME=$DEVICE" >> $GITHUB_ENV
          echo "PLATFORM_VERSION=$VERSION" >> $GITHUB_ENV
          echo "📱 $DEVICE | iOS $VERSION | $UDID"

      - name: Pre-install App on Simulator
        run: |
          xcrun simctl install "${{ env.SIMULATOR_UDID }}" "apps/Z Platform-QA.app"
          echo "✅ App pre-installed"

      - name: Pre-build WebDriverAgent
        run: |
          WDA_PATH=$(find ~/.appium -name "WebDriverAgent.xcodeproj" -type d 2>/dev/null | head -1 | xargs dirname)
          if [ -n "$WDA_PATH" ]; then
            cd "$WDA_PATH"
            xcodebuild build-for-testing \
              -project WebDriverAgent.xcodeproj \
              -scheme WebDriverAgentRunner \
              -destination "platform=iOS Simulator,id=${{ env.SIMULATOR_UDID }}" \
              -derivedDataPath /tmp/wda-build \
              -quiet || echo "WDA pre-build completed"
            echo "✅ WDA pre-built"
          fi

      - name: Start Appium Server
        run: |
          appium --relaxed-security --log-level error > appium.log 2>&1 &
          for i in {1..60}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4723/status 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Appium ready"
              break
            fi
            sleep 2
          done
          sleep 10

      - name: Warm-up WDA Session
        env:
          SIMULATOR_UDID: ${{ env.SIMULATOR_UDID }}
          APP_PATH: ${{ github.workspace }}/apps/Z Platform-QA.app
        run: |
          WDA_SUCCESS=false
          for attempt in 1 2 3 4 5; do
            echo "Warm-up attempt $attempt/5..."

            # Use fresh WDA on retries to avoid stale state
            if [ $attempt -le 2 ]; then
              USE_NEW_WDA="false"
            else
              USE_NEW_WDA="true"
              echo "  ↳ Using fresh WDA build for attempt $attempt"
            fi
            SESSION_RESPONSE=$(curl -s -X POST http://127.0.0.1:4723/session \
              -H "Content-Type: application/json" \
              -d '{
                "capabilities": {
                  "alwaysMatch": {
                    "platformName": "iOS",
                    "appium:automationName": "XCUITest",
                    "appium:deviceName": "'"${{ env.DEVICE_NAME }}"'",
                    "appium:udid": "'"$SIMULATOR_UDID"'",
                    "appium:platformVersion": "'"${{ env.PLATFORM_VERSION }}"'",
                    "appium:app": "'"$APP_PATH"'",
                    "appium:wdaLaunchTimeout": 600000,
                    "appium:wdaConnectionTimeout": 300000,
                    "appium:useNewWDA": '"$USE_NEW_WDA"',
                    "appium:noReset": false
                  }
                }
              }' --max-time 600 2>&1) || true

            SESSION_ID=$(echo "$SESSION_RESPONSE" | grep -o '"sessionId":"[^"]*"' | cut -d'"' -f4 || true)

            if [ -n "$SESSION_ID" ]; then
              echo "✅ WDA warm-up OK"
              WDA_SUCCESS=true
              sleep 3
              curl -s -X DELETE "http://127.0.0.1:4723/session/$SESSION_ID" || true
              sleep 5
              break
            else

              echo "  ❌ Attempt $attempt failed. Response:"

              echo "$SESSION_RESPONSE" | head -5

              if [ $attempt -lt 5 ]; then

                echo "  ↳ Retrying in 10s..."

                sleep 10

              fi
            fi
          done

          if [ "$WDA_SUCCESS" = false ]; then
            echo ""
            echo "❌ WDA warm-up FAILED after 5 attempts!"
            echo "─── Appium log (last 50 lines) ───"
            tail -50 appium.log 2>/dev/null || echo "(no appium log)"
            echo "─── Simulator status ───"
            xcrun simctl list devices | grep -A1 "Booted" || echo "(no booted sim)"
            exit 1
          fi

      - name: Run Site Visit Tests
        continue-on-error: true
        env:
          SIMULATOR_UDID: ${{ env.SIMULATOR_UDID }}
          PLATFORM_VERSION: ${{ env.PLATFORM_VERSION }}
          DEVICE_NAME: ${{ env.DEVICE_NAME }}
          APP_PATH: ${{ github.workspace }}/apps/Z Platform-QA.app
        run: |
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist" 2>/dev/null || echo "com.egalvanic.zplatform-QA")

          # Each matrix leg runs exactly one phase suite (phase1/2/3),
          # so the 3 phases run as PARALLEL jobs instead of one 6h+ suite.
          XML="src/test/resources/parallel/testng-sitevisit-${{ matrix.phase }}.xml"
          echo "🧪 Running Site Visit ${{ matrix.phase }}: $XML"

          mvn test -ntp -B -DfailIfNoTests=true -DsuiteXmlFile="$XML" \
            -DDEVICE_NAME="$DEVICE_NAME" \
            -DPLATFORM_VERSION="$PLATFORM_VERSION" \
            -DSIMULATOR_UDID="$SIMULATOR_UDID" \
            -DAPP_BUNDLE_ID="$BUNDLE_ID" \
            -DAPP_PATH="$APP_PATH" || true

          echo "✅ Site Visit Tests Complete"

      - name: Upload Site Visit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sitevisit-${{ matrix.phase }}-report
          path: |
            target/surefire-reports/
            reports/
            screenshots/
          retention-days: 30
      - name: Send Module Email (sitevisit)
        if: always() && github.event.inputs.send_email != 'false'
        env:
          SMTP_USER: ${{ secrets.EMAIL_USERNAME }}
          SMTP_PASS: ${{ secrets.EMAIL_PASSWORD }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          MODULE_NAME: sitevisit-${{ matrix.phase }}
          JOB_STATUS: ${{ job.status }}
        run: |
          # Send a per-module email AS SOON AS this module finishes — no
          # waiting for the global send-email job. User can review the
          # Detailed report via the workflow-artifacts download link
          # immediately on receipt.
          EMAIL_TO=$(grep 'public static final String EMAIL_TO' src/main/java/com/egalvanic/constants/AppConstants.java | grep -v '^\s*//' | sed 's/.*"\(.*\)".*/\1/' | sed 's/,[[:space:]]*$//')
          export EMAIL_TO
          python3 -m pip install --quiet --break-system-packages defusedxml || python3 -m pip install --quiet defusedxml
          python3 .github/scripts/send-module-email.py
        continue-on-error: true
      # Loud gate runs LAST (after report upload + module email) so evidence
      # always ships first. No continue-on-error here: this step is what turns
      # "0 tests ran / tests failed but mvn was tolerated" jobs RED.
      - name: Test Result Gate
        run: bash .github/scripts/test-result-gate.sh target/surefire-reports

  # ========================================
  # JOB 15b: Work Order Planning (14 tests, [OPERATIONS])
  # ========================================
  workorder-planning-tests:
    name: "Work Order Planning (14 tests)"
    if: ${{ inputs.run_all || inputs.run_sitevisit_workorders }}
    runs-on: macos-15
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
