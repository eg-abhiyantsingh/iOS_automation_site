name: iOS Tests - Full Parallel Suite

# ============================================================
# FULL PARALLEL TEST SUITE - v3.2 (CI OPTIMIZED - Feb 2026)
# ============================================================
# Based on WORKING ios-tests.yml configuration:
#   - appium@next (NOT 2.5.0)
#   - Pre-build WebDriverAgent
#   - Warm-up WDA Session
#   - Boot loop with (Booted) check
#   - 45s post-boot stabilization
#
# OPTIMIZATIONS APPLIED (v3.2):
#   - Reduced scroll retries: 5 -> 2
#   - Reduced sleep durations: 30-40% faster
#   - Reduced retry loops: 5 -> 3
#   - mediumWait -> shortWait: 532 conversions
#   - Scroll duration: 0.5s -> 0.3s
#
# Architecture (6 balanced asset parts + 3 issue phases):
#   Job 0:  smoke-tests        → Smoke CRUD: Login + Site + Asset + Location + Connection + Issue (17 tests)
#   Job 1:  auth-tests         → Authentication (38 tests)
#   Job 2:  site-tests         → Site Selection (52 tests)
#   Job 3:  assets-part1       → Creation + Edit + Busway + Capacitor + Bug Regression (100 tests)
#   Job 4:  assets-part2       → CB + DS + Fuse + Generator + Junction Box + Bug Tests from P1 (120 tests)
#   Job 5:  assets-part3       → Load Center + MCC + MCC Bucket + Motor + Other (97 tests)
#   Job 6:  assets-part4       → OCP + Panelboard + PDU + Relay + SWB + Transformer + Other from P3 (109 tests)
#   Job 7:  assets-part5       → UPS + Utility + VFD + Subtypes (ATS, Busway, Cap, CB, Def, DS) (100 tests)
#   Job 8:  assets-part6       → Subtypes + Tasks + Issues + Connections + Screen + DS/Fuse from P5 (126 tests)
#   Job 9:  issues-phase1      → Issues Phase 1: List + Filter + Search + Creation + Class Change (103 tests)
#   Job 10: issues-phase2      → Issues Phase 2: Thermal + Severity + Temperature + Ultrasonic (50 tests)
#   Job 11: issues-phase3      → Issues Phase 3: Ultrasonic Save + Swipe Delete + Sort + Status + CRUD + NFPA + OSHA (84 tests)
#   Job 12: location-tests     → Locations (82 tests)
#   Job 13: connections-tests  → Connections (94 tests)
#   Job 14: offline-tests      → Offline Mode (35 tests)
#   Job 15: sitevisit-tests    → Site Visit / Work Orders (all phases)
#   Total: ~1190+ tests, ~2.5 hr wall clock (parallel)
# Asset tests (652) split into 6 balanced parts for even CI/CD load
# Issues tests (237) split into 3 phases for even CI/CD load
# ============================================================

on:
  workflow_dispatch:
    inputs:
      run_all:
        description: '✅ Run ALL test suites (overrides the checkboxes below)'
        required: false
        default: false
        type: boolean
      run_smoke:
        description: 'Smoke — quick CRUD sanity'
        required: false
        default: false
        type: boolean
      run_smoke_demo:
        description: 'Demo Smoke — 23 proven-stable critical-journey tests, <15 min, must be 100% green'
        required: false
        default: false
        type: boolean
      run_auth_site:
        description: 'Auth + Site Selection (login, site selection)'
        required: false
        default: false
        type: boolean
      run_assets:
        description: 'Assets — Parts 1–6 (creation, edit, subtypes, all classes)'
        required: false
        default: false
        type: boolean
      run_issues:
        description: 'Issues — Phases 1–3 (list/filter/create, OSHA/Thermal, CRUD/status)'
        required: false
        default: false
        type: boolean
      run_connections_location:
        description: 'Connections + Location'
        required: false
        default: false
        type: boolean
      run_sitevisit_workorders:
        description: 'Site Visit + Work Orders (sitevisit phases + planning)'
        required: false
        default: false
        type: boolean
      run_worktype:
        description: 'Work Types — 13-option dropdown suite (TC_WT_*, 5 sliced jobs)'
        required: false
        default: false
        type: boolean
      run_offline_zp323:
        description: 'Offline + ZP-323'
        required: false
        default: false
        type: boolean
      run_asset_engineer:
        description: 'Asset Engineer — v1.49 SKM equipment library + Engineering section'
        required: false
        default: false
        type: boolean
      run_arc_flash:
        description: 'Arc Flash — readiness dashboard + AF punchlist + breakdown laws + eng-lib canary (34 tests)'
        required: false
        default: false
        type: boolean
      run_arc_flash_ipad:
        description: 'Arc Flash on iPad — same suite + responsive form-factor checks on an iPad Pro simulator (ZP-2373 parity)'
        required: false
        default: false
        type: boolean
      run_api:
        description: 'API contract + S3 bucket-policy drift (no simulator, ~1 min)'
        required: false
        default: false
        type: boolean
      send_email:
        description: 'Send email report after completion'
        required: false
        default: true
        type: boolean

jobs:
  # ========================================
  # API tests — pure HTTP, NO simulator/macOS (auth contract + SLD data-integrity:
  # no orphaned connections/issues, asset-class contract, etc.). Fast (~30s).
  # Select with token 'api-contract'; also runs under 'all'.
  # ========================================
  api-contract-tests:
    name: "API Contract + Data Integrity (no sim)"
    if: ${{ inputs.run_all || inputs.run_api }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Run API contract + data-integrity tests
        run: mvn -B -ntp test -DsuiteXmlFile=testng-api-contract.xml
      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-contract-report
          path: target/surefire-reports/
          retention-days: 30
        continue-on-error: true

  # ========================================
  # S3 Bucket Policy Drift (ZP-774) — pure AWS check, NO simulator/macOS.
  # Verifies all 40 S3 bucket policies across 5 environments (dev/qa/staging/
  # prod/bces-iq) against the version-controlled baselines/ JSON. Runs under the
  # 'run_api' (no-simulator checks) toggle and 'run_all'. Same AWS-creds pattern
  # as ios-tests-smoke.yml — needs repo secrets AWS_ACCESS_KEY_ID /
  # AWS_SECRET_ACCESS_KEY (read-only cicd user). S3PolicyChecker uses the default
  # credential chain when AWS_ACCESS_KEY_ID is set (no named profile needed).
  # ========================================
  s3-drift-tests:
    name: "S3 Bucket Policy Drift (42 checks, no sim)"
    if: ${{ inputs.run_all || inputs.run_api }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      # configure-aws-credentials self-verifies via STS and would HARD-FAIL the job on
      # missing/expired creds. We don't want selecting S3 to break the whole run over an
      # environment-creds issue, so tolerate it and gate the actual test on a real check below.
      - name: Configure AWS Credentials
        id: aws_creds
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      - name: Verify AWS Access
        id: aws_check
        run: |
          if aws sts get-caller-identity >/dev/null 2>&1; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "✅ AWS access verified"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=S3 drift skipped::AWS credentials missing/invalid — skipping S3 bucket-policy drift. Add valid read-only repo secrets AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY (cicd-devops user, us-east-2) to enable it."
          fi
      - name: Run S3 bucket-policy drift tests (all 5 environments, 42 checks)
        if: ${{ steps.aws_check.outputs.ok == 'true' }}
        run: mvn -B -ntp test -DsuiteXmlFile=src/test/resources/smoke/testng-smoke-s3drift.xml
      - name: Upload S3 drift report
        if: ${{ always() && steps.aws_check.outputs.ok == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: s3-drift-report
          path: target/surefire-reports/
          retention-days: 30
        continue-on-error: true

  # ========================================
  # JOB 0: Smoke Tests (17 tests, ~15 min)
  # ========================================
  smoke-tests:
    name: "Smoke - CRUD Tests (17 tests)"
    if: ${{ inputs.run_all || inputs.run_smoke }}
    runs-on: macos-15
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Appium
        run: |
          npm install -g appium@next
          appium driver install xcuitest
          echo "✅ Appium $(appium --version) installed"

      - name: Unzip App
        run: |
          unzip -o apps/Z-Platform-QA.zip -d apps/
          if [ -d "apps/Z-Platform-QA.app" ] && [ ! -d "apps/Z Platform-QA.app" ]; then
            mv "apps/Z-Platform-QA.app" "apps/Z Platform-QA.app"
            echo "✅ Renamed Z-Platform-QA.app → Z Platform-QA.app"
          fi
          ls -la apps/

      - name: Boot Simulator and Wait Until Ready
        run: |
          UDID=$(xcrun simctl list devices available | grep -A 100 "iOS 18" | grep "iPhone 16 Pro" | head -1 | awk -F '[()]' '{print $2}')
          [ -z "$UDID" ] && UDID=$(xcrun simctl list devices available | grep -E "iPhone 16 Pro" | head -1 | awk -F '[()]' '{print $2}')
          [ -z "$UDID" ] && UDID=$(xcrun simctl list devices available | grep -E "iPhone 1[5-6]" | head -1 | awk -F '[()]' '{print $2}')

          if [ -z "$UDID" ]; then
            echo "❌ No iPhone simulator found!"
            exit 1
          fi

          xcrun simctl shutdown "$UDID" 2>/dev/null || true
          sleep 3
          xcrun simctl boot "$UDID" 2>/dev/null || true

          BOOT_TIMEOUT=240
          ELAPSED=0
          while [ $ELAPSED -lt $BOOT_TIMEOUT ]; do
            if xcrun simctl list devices | grep "$UDID" | grep -q "(Booted)"; then
              echo "✅ Simulator booted after ${ELAPSED}s"
              # bootstatus blocks until boot fully completes (usually <15s) — was a fixed 45s sleep
              xcrun simctl bootstatus "$UDID" -b 2>/dev/null || sleep 20
              echo "✅ Simulator ready"
              break
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

          if [ $ELAPSED -ge $BOOT_TIMEOUT ]; then
            echo "❌ Simulator failed to boot"
            exit 1
          fi

          DEVICE=$(xcrun simctl list devices available | grep "$UDID" | awk -F '(' '{print $1}' | xargs)
          VERSION=$(xcrun simctl list devices available | grep -B 50 "$UDID" | grep "-- iOS" | tail -1 | sed 's/.*iOS \([0-9.]*\).*/\1/')
          [ -z "$VERSION" ] && VERSION="18.5"

          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          echo "DEVICE_NAME=$DEVICE" >> $GITHUB_ENV
          echo "PLATFORM_VERSION=$VERSION" >> $GITHUB_ENV
          echo "📱 $DEVICE | iOS $VERSION | $UDID"

      - name: Pre-install App on Simulator
        run: |
          xcrun simctl install "${{ env.SIMULATOR_UDID }}" "apps/Z Platform-QA.app"
          echo "✅ App pre-installed"

      - name: Pre-build WebDriverAgent
        run: |
          WDA_PATH=$(find ~/.appium -name "WebDriverAgent.xcodeproj" -type d 2>/dev/null | head -1 | xargs dirname)
          if [ -n "$WDA_PATH" ]; then
            cd "$WDA_PATH"
            xcodebuild build-for-testing \
              -project WebDriverAgent.xcodeproj \
              -scheme WebDriverAgentRunner \
              -destination "platform=iOS Simulator,id=${{ env.SIMULATOR_UDID }}" \
              -derivedDataPath /tmp/wda-build \
              -quiet || echo "WDA pre-build completed"
            echo "✅ WDA pre-built"
          fi

      - name: Start Appium Server
        run: |
          appium --relaxed-security --log-level error > appium.log 2>&1 &
          for i in {1..60}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4723/status 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Appium ready"
              break
            fi
            sleep 2
          done
          sleep 10

      - name: Warm-up WDA Session
        env:
          SIMULATOR_UDID: ${{ env.SIMULATOR_UDID }}
          APP_PATH: ${{ github.workspace }}/apps/Z Platform-QA.app
        run: |
          WDA_SUCCESS=false
          for attempt in 1 2 3 4 5; do
            echo "Warm-up attempt $attempt/5..."

            # Use fresh WDA on retries to avoid stale state
            if [ $attempt -le 2 ]; then
              USE_NEW_WDA="false"
            else
              USE_NEW_WDA="true"
              echo "  ↳ Using fresh WDA build for attempt $attempt"
            fi
            SESSION_RESPONSE=$(curl -s -X POST http://127.0.0.1:4723/session \
              -H "Content-Type: application/json" \
              -d '{
                "capabilities": {
                  "alwaysMatch": {
                    "platformName": "iOS",
                    "appium:automationName": "XCUITest",
                    "appium:deviceName": "'"${{ env.DEVICE_NAME }}"'",
                    "appium:udid": "'"$SIMULATOR_UDID"'",
                    "appium:platformVersion": "'"${{ env.PLATFORM_VERSION }}"'",
                    "appium:app": "'"$APP_PATH"'",
                    "appium:wdaLaunchTimeout": 600000,
                    "appium:wdaConnectionTimeout": 300000,
                    "appium:useNewWDA": '"$USE_NEW_WDA"',
                    "appium:noReset": false
                  }
                }
              }' --max-time 600 2>&1) || true

            SESSION_ID=$(echo "$SESSION_RESPONSE" | grep -o '"sessionId":"[^"]*"' | cut -d'"' -f4 || true)

            if [ -n "$SESSION_ID" ]; then
              echo "✅ WDA warm-up OK"
              WDA_SUCCESS=true
              sleep 3
              curl -s -X DELETE "http://127.0.0.1:4723/session/$SESSION_ID" || true
              sleep 5
              break
            else

              echo "  ❌ Attempt $attempt failed. Response:"

              echo "$SESSION_RESPONSE" | head -5

              if [ $attempt -lt 5 ]; then

                echo "  ↳ Retrying in 10s..."

                sleep 10

              fi
            fi
          done

          if [ "$WDA_SUCCESS" = false ]; then
            echo ""
            echo "❌ WDA warm-up FAILED after 5 attempts!"
            echo "─── Appium log (last 50 lines) ───"
            tail -50 appium.log 2>/dev/null || echo "(no appium log)"
            echo "─── Simulator status ───"
            xcrun simctl list devices | grep -A1 "Booted" || echo "(no booted sim)"
            exit 1
          fi

      - name: Run Smoke Tests
        continue-on-error: true
        env:
          SIMULATOR_UDID: ${{ env.SIMULATOR_UDID }}
          PLATFORM_VERSION: ${{ env.PLATFORM_VERSION }}
          DEVICE_NAME: ${{ env.DEVICE_NAME }}
          APP_PATH: ${{ github.workspace }}/apps/Z Platform-QA.app
        run: |
          echo "🧪 Running Smoke CRUD Tests (17 tests)"

          # Extract bundle ID from built app so soft restart uses correct ID
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist" 2>/dev/null || echo "com.egalvanic.zplatform-QA")

          for XML in \
            src/test/resources/smoke/testng-smoke-login.xml \
            src/test/resources/smoke/testng-smoke-site-selection.xml \
            src/test/resources/smoke/testng-smoke-asset-crud.xml \
            src/test/resources/smoke/testng-smoke-location-crud.xml \
            src/test/resources/smoke/testng-smoke-connection-crud.xml \
            src/test/resources/smoke/testng-smoke-issue-crud.xml; do
            echo "── Running: $XML ──"
            mvn test -ntp -B -DfailIfNoTests=true -DsuiteXmlFile="$XML" \
              -DDEVICE_NAME="$DEVICE_NAME" \
              -DPLATFORM_VERSION="$PLATFORM_VERSION" \
              -DSIMULATOR_UDID="$SIMULATOR_UDID" \
              -DAPP_BUNDLE_ID="$BUNDLE_ID" \
              -DAPP_PATH="$APP_PATH" || true
          done

          echo "✅ Smoke CRUD Tests Complete"

      - name: Upload Smoke Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: |
            target/surefire-reports/
            reports/
            screenshots/
          retention-days: 30
      - name: Send Module Email (smoke)
        if: always() && github.event.inputs.send_email != 'false'
        env:
          SMTP_USER: ${{ secrets.EMAIL_USERNAME }}
          SMTP_PASS: ${{ secrets.EMAIL_PASSWORD }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          MODULE_NAME: smoke
          JOB_STATUS: ${{ job.status }}
        run: |
          # Send a per-module email AS SOON AS this module finishes — no
          # waiting for the global send-email job. User can review the
          # Detailed report via the workflow-artifacts download link
          # immediately on receipt.
          EMAIL_TO=$(grep 'public static final String EMAIL_TO' src/main/java/com/egalvanic/constants/AppConstants.java | grep -v '^\s*//' | sed 's/.*"\(.*\)".*/\1/' | sed 's/,[[:space:]]*$//')
          export EMAIL_TO
          python3 -m pip install --quiet --break-system-packages defusedxml || python3 -m pip install --quiet defusedxml
          python3 .github/scripts/send-module-email.py
        continue-on-error: true
      # Loud gate runs LAST (after report upload + module email) so evidence
      # always ships first. No continue-on-error here: this step is what turns
      # "0 tests ran / tests failed but mvn was tolerated" jobs RED.
      - name: Test Result Gate
        run: bash .github/scripts/test-result-gate.sh target/surefire-reports
  # ========================================
  # JOB 1: Auth Tests (38 tests, ~45 min)
  # ========================================
  auth-tests:
    name: "Authentication (38 tests)"
    if: ${{ inputs.run_all || inputs.run_auth_site }}
    runs-on: macos-15
    timeout-minutes: 360
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Appium
        run: |
          npm install -g appium@next
          appium driver install xcuitest
          echo "✅ Appium $(appium --version) installed"

      - name: Unzip App
        run: |
          unzip -o apps/Z-Platform-QA.zip -d apps/
          if [ -d "apps/Z-Platform-QA.app" ] && [ ! -d "apps/Z Platform-QA.app" ]; then
            mv "apps/Z-Platform-QA.app" "apps/Z Platform-QA.app"
            echo "✅ Renamed Z-Platform-QA.app → Z Platform-QA.app"
          fi
          ls -la apps/

      - name: Boot Simulator and Wait Until Ready
        run: |
          echo "=== Available Simulators ==="
          xcrun simctl list devices available
          
          UDID=$(xcrun simctl list devices available | grep -A 100 "iOS 18" | grep "iPhone 16 Pro" | head -1 | awk -F '[()]' '{print $2}')
          [ -z "$UDID" ] && UDID=$(xcrun simctl list devices available | grep -E "iPhone 16 Pro" | head -1 | awk -F '[()]' '{print $2}')
          [ -z "$UDID" ] && UDID=$(xcrun simctl list devices available | grep -E "iPhone 1[5-6]" | head -1 | awk -F '[()]' '{print $2}')
          
          if [ -z "$UDID" ]; then
            echo "❌ No iPhone simulator found!"
            exit 1
          fi
          echo "Selected UDID: $UDID"
          
          xcrun simctl shutdown "$UDID" 2>/dev/null || true
          sleep 3
          xcrun simctl boot "$UDID" 2>/dev/null || true
          
          BOOT_TIMEOUT=240
          ELAPSED=0
          while [ $ELAPSED -lt $BOOT_TIMEOUT ]; do
            if xcrun simctl list devices | grep "$UDID" | grep -q "(Booted)"; then
              echo "✅ Simulator is in Booted state after ${ELAPSED}s"
              echo "Waiting for system services (bootstatus)..."
              # bootstatus blocks until boot fully completes (usually <15s) — was a fixed 45s sleep
              xcrun simctl bootstatus "$UDID" -b 2>/dev/null || sleep 20
              echo "✅ Simulator ready!"
              break
            fi
            echo "Waiting for boot... (${ELAPSED}s/${BOOT_TIMEOUT}s)"
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          
          if [ $ELAPSED -ge $BOOT_TIMEOUT ]; then
            echo "❌ Simulator failed to boot within ${BOOT_TIMEOUT}s"
            exit 1
          fi
          
          DEVICE=$(xcrun simctl list devices available | grep "$UDID" | awk -F '(' '{print $1}' | xargs)
          VERSION=$(xcrun simctl list devices available | grep -B 50 "$UDID" | grep "-- iOS" | tail -1 | sed 's/.*iOS \([0-9.]*\).*/\1/')
          [ -z "$VERSION" ] && VERSION="18.5"
          
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          echo "DEVICE_NAME=$DEVICE" >> $GITHUB_ENV
          echo "PLATFORM_VERSION=$VERSION" >> $GITHUB_ENV
          
          echo "📱 Device: $DEVICE"
          echo "📱 UDID: $UDID"
          echo "📱 iOS: $VERSION"

      - name: Pre-install App on Simulator
        run: |
          echo "Installing app on simulator..."
          xcrun simctl install "${{ env.SIMULATOR_UDID }}" "apps/Z Platform-QA.app"
          echo "✅ App pre-installed"

      - name: Pre-build WebDriverAgent
        run: |
          echo "Pre-building WebDriverAgent to avoid timeout on first test..."
          WDA_PATH=$(find ~/.appium -name "WebDriverAgent.xcodeproj" -type d 2>/dev/null | head -1 | xargs dirname)
          
          if [ -n "$WDA_PATH" ]; then
            echo "Found WDA at: $WDA_PATH"
            cd "$WDA_PATH"
            
            xcodebuild build-for-testing \
              -project WebDriverAgent.xcodeproj \
              -scheme WebDriverAgentRunner \
              -destination "platform=iOS Simulator,id=${{ env.SIMULATOR_UDID }}" \
              -derivedDataPath /tmp/wda-build \
              -quiet || echo "WDA pre-build completed (may have warnings)"
            
            echo "✅ WDA pre-built"
          else
            echo "⚠️ WDA not found, will be built on first test run"
          fi

      - name: Start Appium Server
        run: |
          echo "Starting Appium..."
          appium --relaxed-security --log-level error > appium.log 2>&1 &
          APPIUM_PID=$!
          echo "Appium PID: $APPIUM_PID"
          
          APPIUM_READY=false
          for i in {1..60}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4723/status 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Appium server is ready! (HTTP $HTTP_STATUS)"
              APPIUM_READY=true
              break
            fi
            echo "Waiting for Appium... ($i/60) - HTTP: $HTTP_STATUS"
            sleep 2
          done
          
          if [ "$APPIUM_READY" = false ]; then
            echo "❌ Appium failed to start"
            cat appium.log | tail -30
            exit 1
          fi
          
          echo "Waiting 10s for Appium to fully initialize..."
          sleep 10
          echo "✅ Appium server verified and ready"

      - name: Warm-up WDA Session
        env:
          SIMULATOR_UDID: ${{ env.SIMULATOR_UDID }}
          APP_PATH: ${{ github.workspace }}/apps/Z Platform-QA.app
        run: |
          echo "=== Warming up WDA with a test session ==="
          
          WDA_SUCCESS=false
          for attempt in 1 2 3 4 5; do
            echo "Warm-up attempt $attempt/5..."

            # Use fresh WDA on retries to avoid stale state
            if [ $attempt -le 2 ]; then
              USE_NEW_WDA="false"
            else
              USE_NEW_WDA="true"
              echo "  ↳ Using fresh WDA build for attempt $attempt"
            fi
            SESSION_RESPONSE=$(curl -s -X POST http://127.0.0.1:4723/session \
              -H "Content-Type: application/json" \
              -d '{
                "capabilities": {
                  "alwaysMatch": {
                    "platformName": "iOS",
                    "appium:automationName": "XCUITest",
                    "appium:deviceName": "'"${{ env.DEVICE_NAME }}"'",
                    "appium:udid": "'"$SIMULATOR_UDID"'",
                    "appium:platformVersion": "'"${{ env.PLATFORM_VERSION }}"'",
                    "appium:app": "'"$APP_PATH"'",
